<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | Online Library Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 1rem;
            padding: 2.5rem;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.5rem; }
        .logo span { color: #2563eb; }
        .subtitle { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; }
        .otp-inputs {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin: 1.5rem 0;
        }
        .otp-inputs input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            background: white;
        }
        .otp-inputs input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .otp-inputs input.error {
            border-color: #ef4444;
        }
        .otp-inputs input.success {
            border-color: #10b981;
        }
        .btn-verify {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-verify:hover { background: #1d4ed8; }
        .btn-verify:disabled { background: #93c5fd; cursor: not-allowed; }
        .resend-link {
            margin-top: 1rem;
            font-size: 0.875rem;
            color: #64748b;
        }
        .resend-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .resend-link a:hover { text-decoration: underline; }
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #fca5a5;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .success-message {
            background: #ecfdf5;
            color: #065f46;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #6ee7b7;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .info-box {
            background: #f8fafc;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: #475569;
        }
        .info-box strong { color: #1a1a2e; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .timer { font-size: 0.75rem; color: #94a3b8; margin-top: 0.5rem; }
        .back-link { margin-top: 1rem; font-size: 0.875rem; }
        .back-link a { color: #64748b; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Library<span>Hub</span></div>
        <p class="subtitle">Enter the verification code sent to your email</p>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <div class="info-box">
            <strong>Email:</strong> <span id="userEmail">loading...</span>
            <br>
            <span id="userStatus" style="font-size: 0.75rem; color: #64748b;"></span>
        </div>

        <div class="otp-inputs" id="otpContainer">
            <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" autofocus>
            <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
            <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
            <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
            <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
            <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
        </div>

        <button class="btn-verify" id="verifyBtn">Verify Code</button>

        <div class="resend-link">
            Didn't receive the code? <a id="resendBtn">Resend</a>
        </div>
        <div class="timer" id="timerDisplay"></div>
        <div class="back-link">
            <a href="pages/login.html">← Back to Login</a>
        </div>
    </div>

    <script>
        // ==================== GET EMAIL FROM URL ====================
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const provider = urlParams.get('provider') || 'oauth';
        const isNew = urlParams.get('isNew') === 'true';

        const API_BASE = window.API_BASE || 'https://online-library-hub.onrender.com/api';
        const FRONTEND_URL = window.FRONTEND_URL || 'https://online-library-hub.netlify.app';

        let otpAttempts = 0;
        let timerInterval = null;
        let timeLeft = 120;

        // ==================== DISPLAY USER INFO ====================
        document.getElementById('userEmail').textContent = email || 'Unknown';
        if (isNew) {
            document.getElementById('userStatus').textContent = '🆕 New account being created - Please verify your email';
        } else {
            document.getElementById('userStatus').textContent = '🔐 Existing account - Please verify to login';
        }

        // ==================== OTP INPUT HANDLING ====================
        const inputs = document.querySelectorAll('.otp-inputs input');
        const verifyBtn = document.getElementById('verifyBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        inputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '');
                if (this.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                this.classList.remove('error');
                hideMessages();
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
                if (e.key === 'Enter') {
                    verifyOTP();
                }
            });

            input.addEventListener('focus', function() {
                this.select();
            });
        });

        // ==================== MESSAGE HELPERS ====================
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        // ==================== GET OTP VALUE ====================
        function getOTP() {
            let otp = '';
            inputs.forEach(input => { otp += input.value; });
            return otp;
        }

        function clearOTP() {
            inputs.forEach(input => { input.value = ''; });
            inputs[0].focus();
        }

        // ==================== VERIFY OTP ====================
        async function verifyOTP() {
            const otp = getOTP();
            
            if (otp.length !== 6) {
                showError('Please enter the complete 6-digit verification code.');
                inputs.forEach(input => {
                    if (input.value === '') input.classList.add('error');
                });
                return;
            }

            if (!email) {
                showError('Email address not found. Please try logging in again.');
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="spinner"></span> Verifying...';

            try {
                const response = await fetch(`${API_BASE}/auth/verify-oauth-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('token', data.token);
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                        if (data.user.isNewUser) {
                            localStorage.setItem('isNewUser', 'true');
                        }
                    }
                    
                    showSuccess('✅ Verification successful! Redirecting...');
                    inputs.forEach(input => input.classList.add('success'));
                    
                    setTimeout(() => {
                        window.location.href = '/pages/dashboard.html';
                    }, 1500);
                    
                } else {
                    otpAttempts++;
                    showError(data.message || 'Invalid verification code. Please try again.');
                    inputs.forEach(input => input.classList.add('error'));
                    
                    if (otpAttempts >= 5) {
                        showError('Too many failed attempts. Please request a new code.');
                        verifyBtn.disabled = true;
                    }
                    
                    setTimeout(() => {
                        inputs.forEach(input => input.classList.remove('error'));
                        clearOTP();
                    }, 2000);
                }

            } catch (error) {
                console.error('OTP verification error:', error);
                showError('Server error. Please try again.');
            }

            verifyBtn.disabled = false;
            verifyBtn.textContent = 'Verify Code';
        }

        // ==================== RESEND OTP ====================
        async function resendOTP() {
            if (!email) {
                showError('Email address not found. Please try logging in again.');
                return;
            }

            const resendBtn = document.getElementById('resendBtn');
            resendBtn.style.pointerEvents = 'none';
            resendBtn.style.opacity = '0.5';

            try {
                const response = await fetch(`${API_BASE}/auth/resend-oauth-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showSuccess('✅ New verification code sent to your email!');
                    clearOTP();
                    otpAttempts = 0;
                    verifyBtn.disabled = false;
                    startTimer();
                } else {
                    showError(data.message || 'Failed to resend code. Please try again.');
                }
            } catch (error) {
                console.error('Resend OTP error:', error);
                showError('Server error. Please try again.');
            }

            setTimeout(() => {
                resendBtn.style.pointerEvents = 'auto';
                resendBtn.style.opacity = '1';
            }, 30000);
        }

        // ==================== TIMER ====================
        function startTimer() {
            timeLeft = 120;
            const timerDisplay = document.getElementById('timerDisplay');
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `Resend available in ${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = 'You can request a new code now.';
                    document.getElementById('resendBtn').style.pointerEvents = 'auto';
                    document.getElementById('resendBtn').style.opacity = '1';
                }
            }, 1000);
        }

        // ==================== EVENT LISTENERS ====================
        verifyBtn.addEventListener('click', verifyOTP);
        document.getElementById('resendBtn').addEventListener('click', resendOTP);

        inputs.forEach(input => {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') verifyOTP();
            });
        });

        // ==================== INIT ====================
        if (!email) {
            showError('Email address not found. Please try logging in again.');
        } else {
            inputs[0].focus();
            startTimer();
        }
    </script>
</body>
</html>
