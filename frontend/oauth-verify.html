<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete Sign Up | Online Library Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #f5f7fa;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .navbar {
        background: white;
        border-bottom: 1px solid #e2e8f0;
        padding: 0.75rem 2rem;
      }
      .logo a {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1a1a2e;
        text-decoration: none;
      }
      .logo a span {
        color: #2563eb;
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
      }
      .verify-card {
        max-width: 480px;
        width: 100%;
        background: white;
        border-radius: 1rem;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        padding: 2rem;
        text-align: center;
      }
      .provider-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      .provider-icon .fa-google {
        color: #ea4335;
      }
      .provider-icon .fa-github {
        color: #333;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .subtitle {
        color: #64748b;
        font-size: 0.875rem;
        margin-bottom: 1rem;
      }
      .email-display {
        background: #f1f5f9;
        padding: 0.75rem;
        border-radius: 0.5rem;
        margin: 1rem 0;
        font-weight: 500;
        color: #2563eb;
      }
      .otp-input {
        width: 100%;
        padding: 0.75rem;
        font-size: 1.5rem;
        text-align: center;
        letter-spacing: 0.5rem;
        border: 2px solid #e2e8f0;
        border-radius: 0.5rem;
        font-family: monospace;
      }
      .otp-input:focus {
        outline: none;
        border-color: #2563eb;
      }
      .btn-verify {
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        padding: 0.75rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        margin-top: 1rem;
      }
      .btn-verify:hover {
        background: #1d4ed8;
      }
      .btn-verify:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }
      .resend-link {
        margin-top: 1rem;
        font-size: 0.875rem;
      }
      .resend-link a {
        color: #2563eb;
        text-decoration: none;
      }
      .message {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        display: none;
      }
      .message.success {
        display: block;
        background: #ecfdf5;
        color: #047857;
      }
      .message.error {
        display: block;
        background: #fef2f2;
        color: #b91c1c;
      }
      footer {
        background: white;
        text-align: center;
        padding: 1.5rem;
        color: #64748b;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">Library<span>Hub</span></a>
      </div>
    </nav>

    <main>
      <div class="verify-card">
        <div class="provider-icon" id="providerIcon">
          <i class="fab fa-google"></i>
        </div>
        <h1>Complete your sign up</h1>
        <p class="subtitle">We've sent a verification code to:</p>
        <div class="email-display" id="emailDisplay">loading...</div>
        <p class="subtitle">
          Enter the 6-digit code to complete your account creation
        </p>

        <input
          type="text"
          class="otp-input"
          id="otpInput"
          placeholder="000000"
          maxlength="6"
          autocomplete="off" />

        <button class="btn-verify" id="verifyBtn">
          Verify & Complete Sign Up
        </button>

        <div class="resend-link">
          <a href="#" id="resendLink">Didn't receive code? Resend</a>
        </div>

        <div id="messageDiv" class="message"></div>
      </div>
    </main>

    <footer>
      <p>
        &copy; <span id="current-year"></span> Online Library Hub. All rights
        reserved.
      </p>
    </footer>

    <script src="/scripts/api-config.js"></script>
    <script>
      document.getElementById("current-year").textContent =
        new Date().getFullYear();

      const API_BASE_URL =
        window.API_BASE || "https://online-library-hub.onrender.com/api";
      const urlParams = new URLSearchParams(window.location.search);
      const email = urlParams.get("email");
      const name = urlParams.get("name");
      const provider = urlParams.get("provider") || "google";

      // Update provider icon
      const providerIcon = document.getElementById("providerIcon");
      if (provider === "github") {
        providerIcon.innerHTML = '<i class="fab fa-github"></i>';
      } else {
        providerIcon.innerHTML = '<i class="fab fa-google"></i>';
      }

      const emailDisplay = document.getElementById("emailDisplay");
      const otpInput = document.getElementById("otpInput");
      const verifyBtn = document.getElementById("verifyBtn");
      const resendLink = document.getElementById("resendLink");
      const messageDiv = document.getElementById("messageDiv");

      function showMessage(msg, type) {
        messageDiv.textContent = msg;
        messageDiv.className = "message " + type;
        setTimeout(() => {
          messageDiv.style.display = "none";
        }, 5000);
      }

      if (email) {
        emailDisplay.textContent = decodeURIComponent(email);
      } else {
        emailDisplay.textContent = "Email not found";
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      }

      // Verify OTP and complete account creation
      verifyBtn.addEventListener("click", async () => {
        const otp = otpInput.value.trim();

        if (!otp || otp.length !== 6) {
          showMessage("Please enter the 6-digit verification code", "error");
          return;
        }

        verifyBtn.disabled = true;
        verifyBtn.textContent = "Verifying...";

        try {
          const response = await fetch(`${API_BASE_URL}/oauth/verify`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: decodeURIComponent(email),
              otp: otp,
              provider: provider,
            }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            // Store token and user data
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));

            showMessage(
              "Account verified! Redirecting to dashboard...",
              "success",
            );

            setTimeout(() => {
              window.location.href = "/pages/dashboard.html";
            }, 2000);
          } else {
            showMessage(data.error || "Invalid verification code", "error");
            verifyBtn.disabled = false;
            verifyBtn.textContent = "Verify & Complete Sign Up";
          }
        } catch (err) {
          console.error("Verification error:", err);
          showMessage("Server error. Please try again.", "error");
          verifyBtn.disabled = false;
          verifyBtn.textContent = "Verify & Complete Sign Up";
        }
      });

      // Resend OTP
      resendLink.addEventListener("click", async (e) => {
        e.preventDefault();

        resendLink.style.pointerEvents = "none";
        resendLink.style.opacity = "0.5";

        try {
          // Trigger the OAuth flow again to resend OTP
          // Or call a resend endpoint
          showMessage(
            "If you have an account, please try logging in again.",
            "error",
          );

          setTimeout(() => {
            window.location.href = "/login.html";
          }, 2000);
        } catch (err) {
          showMessage("Failed to resend code. Please try again.", "error");
        }

        setTimeout(() => {
          resendLink.style.pointerEvents = "auto";
          resendLink.style.opacity = "1";
        }, 30000);
      });

      otpInput.addEventListener("input", () => {
        if (otpInput.value.length === 6) {
          verifyBtn.click();
        }
      });
    </script>
  </body>
</html>
