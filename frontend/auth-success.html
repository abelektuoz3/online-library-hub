<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Successful - Online Library Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 50px 60px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
        }
        
        .success-icon {
            font-size: 64px;
            margin-bottom: 10px;
            display: block;
        }
        
        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        p {
            color: #718096;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            animation: progress 2s ease-in-out forwards;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        .error-message {
            color: #e53e3e;
            background: #fff5f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #feb2b2;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="success-icon">✅</span>
        <h1>Authentication Successful!</h1>
        <p>You have been successfully authenticated. Redirecting you to your dashboard...</p>
        <div class="spinner"></div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p style="font-size: 14px; margin-top: 20px; color: #a0aec0;">
            You will be redirected automatically in a few seconds.
        </p>
    </div>
    
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const error = urlParams.get('error');
        
        console.log('🔐 Auth success page loaded');
        console.log('Token present:', !!token);
        console.log('Error present:', !!error);
        
        // Handle errors first
        if (error) {
            console.error('❌ Authentication error:', error);
            const errorMessages = {
                'github_auth_failed': 'GitHub authentication failed. Please try again.',
                'google_auth_failed': 'Google authentication failed. Please try again.',
                'no_token': 'No authentication token received. Please try again.',
                'invalid_token': 'Invalid authentication token. Please try again.'
            };
            
            const errorMessage = errorMessages[error] || 'Authentication failed. Please try again.';
            
            // Show error in the UI
            document.querySelector('.container').innerHTML = `
                <span class="success-icon">❌</span>
                <h1>Authentication Failed</h1>
                <div class="error-message">${errorMessage}</div>
                <button onclick="window.location.href='/login.html'" 
                        style="
                            background: #667eea;
                            color: white;
                            border: none;
                            padding: 12px 30px;
                            border-radius: 8px;
                            font-size: 16px;
                            cursor: pointer;
                            margin-top: 10px;
                            transition: background 0.3s;
                        "
                        onmouseover="this.style.background='#5a67d8'"
                        onmouseout="this.style.background='#667eea'">
                    Go to Login
                </button>
            `;
            return;
        }
        
        // Handle token
        if (token) {
            try {
                // Store token
                localStorage.setItem('authToken', token);
                console.log('✅ Token stored successfully');
                
                // Redirect to dashboard after 2.5 seconds
                setTimeout(() => {
                    console.log('🔄 Redirecting to dashboard...');
                    window.location.href = '/dashboard.html';
                }, 2500);
            } catch (err) {
                console.error('Error storing token:', err);
                // Fallback redirect
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 2500);
            }
        } else {
            // No token received
            console.warn('⚠️ No token received in URL');
            document.querySelector('.container').innerHTML = `
                <span class="success-icon">⚠️</span>
                <h1>No Authentication Token</h1>
                <p>We couldn't find an authentication token. Please try logging in again.</p>
                <button onclick="window.location.href='/login.html'" 
                        style="
                            background: #667eea;
                            color: white;
                            border: none;
                            padding: 12px 30px;
                            border-radius: 8px;
                            font-size: 16px;
                            cursor: pointer;
                            margin-top: 10px;
                            transition: background 0.3s;
                        "
                        onmouseover="this.style.background='#5a67d8'"
                        onmouseout="this.style.background='#667eea'">
                    Go to Login
                </button>
            `;
        }
    </script>
</body>
</html>
