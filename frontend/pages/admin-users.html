<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Users | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../../style/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            color: #1a1a2e;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: all 0.2s;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1a1a2e;
        }

        .sidebar-header h2 span {
            color: #2563eb;
        }

        .sidebar-nav {
            padding: 1.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .nav-item {
            padding: 0.75rem 1.5rem;
            margin: 0 0.75rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #4b5563;
            font-weight: 600;
            font-size: 0.875rem;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            background: #eff6ff;
            color: #2563eb;
        }

        .nav-item.active {
            background: #2563eb;
            color: white;
        }

        .nav-item i {
            width: 1.25rem;
            font-size: 1rem;
            color: #64748b;
            transition: color 0.2s;
        }

        .nav-item:hover i,
        .nav-item.active i {
            color: currentColor;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: #f5f7fa;
            min-height: 100vh;
            transition: all 0.2s;
        }

        .top-bar {
            background: white;
            border-radius: 1rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .page-title h1 {
            font-size: 1.375rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 0.25rem;
        }

        .page-title p {
            color: #64748b;
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #adminName {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        .logout-btn {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fee2e2;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8125rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #fee2e2;
            border-color: #fca5a5;
        }

        .dashboard-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .card-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-header-title i {
            font-size: 1.5rem;
            color: #2563eb;
        }

        .card-header-title h3 {
            font-size: 1.125rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .table-responsive {
            overflow-x: auto;
            margin: 0 -1.5rem -1.5rem -1.5rem;
            border-bottom-left-radius: 1rem;
            border-bottom-right-radius: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
        }

        td {
            font-size: 0.875rem;
            color: #334155;
            vertical-align: middle;
        }

        tr:hover td {
            background: #f8fafc;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-active {
            background: #ecfdf5;
            color: #047857;
        }

        .status-suspended {
            background: #fef2f2;
            color: #b91c1c;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.375rem;
            border-radius: 0.375rem;
            color: #64748b;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: #f1f5f9;
            color: #2563eb;
        }

        .btn-delete:hover {
            background: #fef2f2;
            color: #ef4444;
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 70px;
            }
            .sidebar-header h2,
            .sidebar-nav span {
                display: none;
            }
            .main-content {
                margin-left: 70px;
            }
        }

        @media (max-width: 768px) {
            .admin-container {
                flex-direction: column;
            }
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
            .sidebar-header h2 {
                display: block;
            }
            .sidebar-nav span {
                display: block;
            }
            .sidebar-nav {
                flex-direction: row;
                overflow-x: auto;
                padding: 0.75rem;
                gap: 0.5rem;
            }
            .nav-item {
                margin: 0;
                padding: 0.5rem 1rem;
            }
            .main-content {
                margin-left: 0;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../../index.html" style="text-decoration: none; color: inherit">
                    <h2>Library<span>Hub</span></h2>
                </a>
                <p style="font-size: 0.75rem; font-weight: 600; color: #64748b; margin-top: 0.25rem;">
                    Admin Panel
                </p>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item" href="admin-dashboard.html">
                    <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
                </a>
                <a class="nav-item" href="admin-resources.html">
                    <i class="fas fa-book"></i> <span>Resources</span>
                </a>
                <a class="nav-item active" href="admin-users.html">
                    <i class="fas fa-users"></i> <span>Users</span>
                </a>
                <a class="nav-item" href="admin-messages.html">
                    <i class="fas fa-envelope"></i> <span>Messages</span>
                </a>
                <a class="nav-item" href="admin-announcements.html">
                    <i class="fas fa-bullhorn"></i> <span>Announcements</span>
                </a>
                <a class="nav-item" href="admin-courses.html">
                    <i class="fas fa-graduation-cap"></i> <span>Courses</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="page-title">
                    <h1>Users</h1>
                    <p>Manage registered users</p>
                </div>
                <div class="user-info">
                    <span id="adminName">Admin</span>
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>

            <!-- Users Table -->
            <div class="dashboard-card">
                <div class="card-header-flex">
                    <div class="card-header-title">
                        <i class="fas fa-users"></i>
                        <h3>All Users</h3>
                    </div>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Joined</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="6" style="text-align:center; padding:2rem; color:#94a3b8;">
                                    <i class="fas fa-spinner fa-spin"></i> Loading users...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../../scripts/api-config.js"></script>
    <script>
        const API_BASE = window.API_BASE || "https://online-library-hub.onrender.com/api";

        function getToken() {
            return localStorage.getItem("adminToken");
        }

        function getAdmin() {
            const admin = localStorage.getItem("admin");
            if (admin) {
                try {
                    return JSON.parse(admin);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function (m) {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });
        }

        async function checkAdminAccess() {
            const token = getToken();
            const admin = getAdmin();

            if (!token || !admin || !admin.id) {
                window.location.href = "../admin-login.html";
                return false;
            }

            try {
                const response = await fetch(`${API_BASE}/admin/verify`, {
                    headers: { Authorization: `Bearer ${token}` },
                });

                if (!response.ok) {
                    localStorage.removeItem("adminToken");
                    localStorage.removeItem("admin");
                    window.location.href = "../admin-login.html";
                    return false;
                }

                document.getElementById("adminName").textContent = `👑 ${admin.name}`;
                return true;
            } catch (err) {
                console.error("Admin verification error:", err);
                window.location.href = "../admin-login.html";
                return false;
            }
        }

        async function loadUsers() {
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/admin/users`, {
                    headers: { Authorization: `Bearer ${token}` },
                });
                const data = await response.json();
                const tbody = document.getElementById("usersTableBody");

                if (data.success && data.users && data.users.length) {
                    tbody.innerHTML = data.users
                        .map((u) => {
                            const userId = u._id || u.id;
                            return `
                                <tr>
                                    <td><strong>${escapeHtml(u.name)}</strong></td>
                                    <td>${escapeHtml(u.email)}</td>
                                    <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                                    <td>${u.role === "admin" ? "👑 Admin" : "👤 User"}</td>
                                    <td><span class="status-badge ${u.isSuspended ? "status-suspended" : "status-active"}">${u.isSuspended ? "Suspended" : "Active"}</span></td>
                                    <td>
                                        ${u.role !== "admin" ? `<button class="btn-icon" onclick="makeAdmin('${userId}')" title="Make Admin"><i class="fas fa-crown"></i></button>` : ""}
                                        ${u.role !== "admin" ? (u.isSuspended ? `<button class="btn-icon" onclick="toggleSuspension('${userId}', false)" title="Unsuspend user"><i class="fas fa-user-check"></i></button>` : `<button class="btn-icon btn-delete" onclick="toggleSuspension('${userId}', true)" title="Suspend user"><i class="fas fa-user-slash"></i></button>`) : ""}
                                        <button class="btn-icon btn-delete" onclick="deleteUser('${userId}')" title="Delete user"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            `;
                        })
                        .join("");
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem; color:#94a3b8;">No users found</td></tr>';
                }
            } catch (err) {
                console.error("Error loading users:", err);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem; color:#ef4444;">Error loading users</td></tr>';
            }
        }

        window.makeAdmin = async function (userId) {
            if (!confirm("Make this user an admin?")) return;
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/admin/users/${userId}/make-admin`, {
                    method: "PUT",
                    headers: { Authorization: `Bearer ${token}` },
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    loadUsers();
                    alert("User promoted to admin successfully!");
                } else {
                    alert(data.error || "Failed to promote user.");
                }
            } catch (err) {
                console.error("Error making admin:", err);
                alert("Error making admin. Please try again.");
            }
        };

        window.toggleSuspension = async function (userId, suspend) {
            const action = suspend ? "suspend" : "unsuspend";
            if (!confirm(`Are you sure you want to ${action} this user?`)) return;

            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/admin/users/${userId}/suspension`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${token}`,
                    },
                    body: JSON.stringify({ suspended: suspend }),
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    loadUsers();
                    alert(`User ${action}ed successfully!`);
                } else {
                    alert(data.error || `Failed to ${action} user.`);
                }
            } catch (err) {
                console.error(`Error trying to ${action} user:`, err);
                alert("Server error. Please try again.");
            }
        };

        window.deleteUser = async function (userId) {
            if (!confirm("Delete this user?")) return;
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/admin/users/${userId}`, {
                    method: "DELETE",
                    headers: { Authorization: `Bearer ${token}` },
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    loadUsers();
                    alert("User deleted successfully!");
                } else {
                    alert(data.error || "Failed to delete user.");
                }
            } catch (err) {
                console.error("Error deleting user:", err);
                alert("Error deleting user. Please try again.");
            }
        };

        // Logout
        document.getElementById("logoutBtn").addEventListener("click", (e) => {
            e.preventDefault();
            localStorage.removeItem("adminToken");
            localStorage.removeItem("admin");
            window.location.href = "../admin-login.html";
        });

        // Initialize
        (async () => {
            const isAdmin = await checkAdminAccess();
            if (isAdmin) {
                await loadUsers();
            }
        })();
    </script>
</body>
</html>
