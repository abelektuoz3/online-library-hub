<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Resources | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../../style/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            color: #1a1a2e;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: all 0.2s;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1a1a2e;
        }

        .sidebar-header h2 span {
            color: #2563eb;
        }

        .sidebar-nav {
            padding: 1.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .nav-item {
            padding: 0.75rem 1.5rem;
            margin: 0 0.75rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #4b5563;
            font-weight: 600;
            font-size: 0.875rem;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            background: #eff6ff;
            color: #2563eb;
        }

        .nav-item.active {
            background: #2563eb;
            color: white;
        }

        .nav-item i {
            width: 1.25rem;
            font-size: 1rem;
            color: #64748b;
            transition: color 0.2s;
        }

        .nav-item:hover i,
        .nav-item.active i {
            color: currentColor;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: #f5f7fa;
            min-height: 100vh;
            transition: all 0.2s;
        }

        .top-bar {
            background: white;
            border-radius: 1rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .page-title h1 {
            font-size: 1.375rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 0.25rem;
        }

        .page-title p {
            color: #64748b;
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #adminName {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        .logout-btn {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fee2e2;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8125rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #fee2e2;
            border-color: #fca5a5;
        }

        .dashboard-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .card-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-header-title i {
            font-size: 1.5rem;
            color: #2563eb;
        }

        .card-header-title h3 {
            font-size: 1.125rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .btn-add {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background: #1d4ed8;
        }

        .table-responsive {
            overflow-x: auto;
            margin: 0 -1.5rem -1.5rem -1.5rem;
            border-bottom-left-radius: 1rem;
            border-bottom-right-radius: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
        }

        td {
            font-size: 0.875rem;
            color: #334155;
            vertical-align: middle;
        }

        tr:hover td {
            background: #f8fafc;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-approved {
            background: #ecfdf5;
            color: #047857;
        }

        .status-suspended {
            background: #fef2f2;
            color: #b91c1c;
        }

        .badge-type {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-book {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .badge-course {
            background: #fce7f3;
            color: #be185d;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.375rem;
            border-radius: 0.375rem;
            color: #64748b;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: #f1f5f9;
            color: #2563eb;
        }

        .btn-delete:hover {
            background: #fef2f2;
            color: #ef4444;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2e8f0;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
        }

        .modal-content label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #4b5563;
            display: block;
            margin-bottom: 0.25rem;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 0.625rem 0.875rem;
            margin-bottom: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-content input:focus,
        .modal-content select:focus,
        .modal-content textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .modal-content .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            color: #cbd5e1;
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 70px;
            }
            .sidebar-header h2,
            .sidebar-nav span {
                display: none;
            }
            .main-content {
                margin-left: 70px;
            }
        }

        @media (max-width: 768px) {
            .admin-container {
                flex-direction: column;
            }
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
            .sidebar-header h2 {
                display: block;
            }
            .sidebar-nav span {
                display: block;
            }
            .sidebar-nav {
                flex-direction: row;
                overflow-x: auto;
                padding: 0.75rem;
                gap: 0.5rem;
            }
            .nav-item {
                margin: 0;
                padding: 0.5rem 1rem;
            }
            .main-content {
                margin-left: 0;
                padding: 1rem;
            }
            .modal-content .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../../index.html" style="text-decoration: none; color: inherit">
                    <h2>Library<span>Hub</span></h2>
                </a>
                <p style="font-size: 0.75rem; font-weight: 600; color: #64748b; margin-top: 0.25rem;">
                    Admin Panel
                </p>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item" href="admin-dashboard.html">
                    <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
                </a>
                <a class="nav-item active" href="admin-resources.html">
                    <i class="fas fa-book"></i> <span>Resources</span>
                </a>
                <a class="nav-item" href="admin-users.html">
                    <i class="fas fa-users"></i> <span>Users</span>
                </a>
                <a class="nav-item" href="admin-messages.html">
                    <i class="fas fa-envelope"></i> <span>Messages</span>
                </a>
                <a class="nav-item" href="admin-announcements.html">
                    <i class="fas fa-bullhorn"></i> <span>Announcements</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="page-title">
                    <h1>Resources</h1>
                    <p>Manage your library resources and courses</p>
                </div>
                <div class="user-info">
                    <span id="adminName">Admin</span>
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>

            <!-- Resources Table -->
            <div class="dashboard-card">
                <div class="card-header-flex">
                    <div class="card-header-title">
                        <i class="fas fa-book"></i>
                        <h3>All Resources</h3>
                    </div>
                    <button class="btn-add" id="addResourceBtn">
                        <i class="fas fa-plus"></i> Add Resource
                    </button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Type</th>
                                <th>Category</th>
                                <th>Grade Level</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="resourcesTableBody">
                            <tr>
                                <td colspan="6" class="loading" style="text-align:center; padding:2rem; color:#94a3b8;">
                                    <i class="fas fa-spinner fa-spin"></i> Loading resources...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Resource Modal -->
    <div id="resourceModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Resource</h3>
            
            <!-- Resource Type Selector -->
            <label>Resource Type *</label>
            <select id="resourceTypeSelector">
                <option value="book">📚 Book / Resource</option>
                <option value="course">🎓 Course</option>
            </select>

            <input type="text" id="resourceTitle" placeholder="Title *" />
            
            <div class="form-row">
                <div>
                    <label>Category *</label>
                    <select id="resourceCategory">
                        <option value="">Select Category *</option>
                        <option value="Fiction">Fiction</option>
                        <option value="Non-Fiction">Non-Fiction</option>
                        <option value="Programming">Programming</option>
                        <option value="History">History</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="English">English</option>
                        <option value="Arts">Arts</option>
                        <option value="Technology">Technology</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label>Grade Level *</label>
                    <select id="resourceGrade">
                        <option value="">Select Grade Level *</option>
                        <option value="Grade 8-10">Grade 8-10</option>
                        <option value="Grade 9-11">Grade 9-11</option>
                        <option value="Grade 9-12">Grade 9-12</option>
                        <option value="Grade 10-12">Grade 10-12</option>
                        <option value="Grade 11-12">Grade 11-12</option>
                        <option value="College">College</option>
                        <option value="University">University</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <label>Resource Type Detail *</label>
            <select id="resourceType">
                <option value="">Select Resource Type *</option>
                <option value="Book">Book</option>
                <option value="E-Book">E-Book</option>
                <option value="Textbook">Textbook</option>
                <option value="Reference">Reference</option>
                <option value="Lab Manual">Lab Manual</option>
                <option value="Video">Video</option>
                <option value="Audio">Audio</option>
                <option value="Course">Course</option>
                <option value="Other">Other</option>
            </select>

            <textarea id="resourceDesc" placeholder="Description" rows="3"></textarea>
            
            <input type="file" id="resourceFile" accept="application/pdf,video/*,audio/*" style="margin-bottom: 1rem" />
            
            <div class="modal-buttons">
                <button class="btn-secondary" id="closeModalBtn">Cancel</button>
                <button class="btn-primary" id="saveResourceBtn">Save</button>
            </div>
        </div>
    </div>

    <script src="../../scripts/api-config.js"></script>
    <script>
        const API_BASE = window.API_BASE || "https://online-library-hub.onrender.com/api";
        let editingResourceId = null;

        function getToken() {
            return localStorage.getItem("adminToken");
        }

        function getAdmin() {
            const admin = localStorage.getItem("admin");
            if (admin) {
                try {
                    return JSON.parse(admin);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function (m) {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });
        }

        async function checkAdminAccess() {
            const token = getToken();
            const admin = getAdmin();

            if (!token || !admin || !admin.id) {
                window.location.href = "../admin-login.html";
                return false;
            }

            try {
                const response = await fetch(`${API_BASE}/admin/verify`, {
                    headers: { Authorization: `Bearer ${token}` },
                });

                if (!response.ok) {
                    localStorage.removeItem("adminToken");
                    localStorage.removeItem("admin");
                    window.location.href = "../admin-login.html";
                    return false;
                }

                document.getElementById("adminName").textContent = `👑 ${admin.name}`;
                return true;
            } catch (err) {
                console.error("Admin verification error:", err);
                window.location.href = "../admin-login.html";
                return false;
            }
        }

        async function loadResources() {
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/admin/resources`, {
                    headers: { Authorization: `Bearer ${token}` },
                });
                const data = await response.json();
                const tbody = document.getElementById("resourcesTableBody");

                if (data.success && data.resources && data.resources.length) {
                    tbody.innerHTML = data.resources
                        .map((r) => {
                            const resourceId = r._id || r.id;
                            const isAvailable = r.available !== false;
                            const statusHtml = isAvailable 
                                ? '<span class="status-badge status-approved">✅ Available</span>' 
                                : '<span class="status-badge status-suspended">❌ Unavailable</span>';
                            
                            const typeBadge = r.resourceType === 'course' 
                                ? '<span class="badge-type badge-course">🎓 Course</span>'
                                : '<span class="badge-type badge-book">📚 Book</span>';
                            
                            const gradeDisplay = r.grade_level || r.grade || 'N/A';
                            
                            return `
                                <tr>
                                    <td><strong>${escapeHtml(r.title)}</strong></td>
                                    <td>${typeBadge}</td>
                                    <td>${escapeHtml(r.category || "-")}</td>
                                    <td>${escapeHtml(gradeDisplay)}</td>
                                    <td>${statusHtml}</td>
                                    <td>
                                        <button class="btn-icon" onclick="editResource('${resourceId}')" title="Edit resource"><i class="fas fa-edit"></i></button>
                                        <button class="btn-icon btn-delete" onclick="deleteResource('${resourceId}')" title="Delete resource"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            `;
                        })
                        .join("");
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="fas fa-book-open"></i>
                                    <p>No resources found. Click "Add Resource" to get started.</p>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            } catch (err) {
                console.error("Error loading resources:", err);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem; color:#ef4444;">Error loading resources</td></tr>';
            }
        }

        window.editResource = function (id) {
            if (!id || id === 'undefined' || id === 'null') {
                alert('Invalid resource ID. Please refresh and try again.');
                return;
            }
            editingResourceId = id;
            document.getElementById("modalTitle").textContent = "Edit Resource";
            document.getElementById("resourceModal").classList.add("active");
            fetchResourceDetails(id);
        };

        async function fetchResourceDetails(id) {
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/admin/resources/${id}`, {
                    headers: { Authorization: `Bearer ${token}` },
                });
                const data = await response.json();
                if (data.success && data.resource) {
                    document.getElementById("resourceTitle").value = data.resource.title || "";
                    document.getElementById("resourceCategory").value = data.resource.category || "";
                    document.getElementById("resourceGrade").value = data.resource.grade_level || data.resource.grade || "";
                    document.getElementById("resourceType").value = data.resource.resource_type || data.resource.type || "";
                    document.getElementById("resourceDesc").value = data.resource.description || "";
                    
                    // Set resource type selector
                    const resourceType = data.resourceType || 'book';
                    document.getElementById("resourceTypeSelector").value = resourceType;
                }
            } catch (err) {
                console.error("Error fetching resource details:", err);
                alert("Error loading resource details. Please try again.");
            }
        }

        window.deleteResource = async function (id) {
            if (!id || id === 'undefined' || id === 'null') {
                alert('Invalid resource ID. Please refresh and try again.');
                return;
            }
            if (!confirm("Delete this resource?")) return;
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/admin/resources/${id}`, {
                    method: "DELETE",
                    headers: { Authorization: `Bearer ${token}` },
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    loadResources();
                    alert("Resource deleted successfully!");
                } else {
                    alert(data.error || "Failed to delete resource.");
                }
            } catch (err) {
                console.error("Error deleting resource:", err);
                alert("Error deleting resource. Please try again.");
            }
        };

        async function saveResource() {
            const token = getToken();
            
            if (!token) {
                alert("Your admin session has expired. Please login again.");
                window.location.href = "../admin-login.html";
                return;
            }

            const resourceType = document.getElementById("resourceTypeSelector").value;
            const title = document.getElementById("resourceTitle").value.trim();
            const category = document.getElementById("resourceCategory").value;
            const gradeLevel = document.getElementById("resourceGrade").value;
            const resourceTypeDetail = document.getElementById("resourceType").value;
            const description = document.getElementById("resourceDesc").value.trim();

            if (!title || !category || !gradeLevel || !resourceTypeDetail) {
                alert("Please fill in all required fields.");
                return;
            }

            const formData = new FormData();
            formData.append("title", title);
            formData.append("category", category);
            formData.append("grade_level", gradeLevel);
            formData.append("resource_type", resourceTypeDetail);
            formData.append("description", description);
            formData.append("available", "true");
            formData.append("resourceType", resourceType);

            const fileInput = document.getElementById("resourceFile");
            if (fileInput && fileInput.files && fileInput.files.length > 0) {
                formData.append("file", fileInput.files[0]);
            }

            const url = editingResourceId
                ? `${API_BASE}/admin/resources/${editingResourceId}`
                : `${API_BASE}/admin/resources`;
            const method = editingResourceId ? "PUT" : "POST";

            try {
                console.log(`📡 ${method} request to:`, url);
                
                const response = await fetch(url, {
                    method: method,
                    headers: { "Authorization": `Bearer ${token}` },
                    body: formData
                });

                const data = await response.json();
                console.log("📨 Response:", data);

                if (response.status === 401) {
                    localStorage.removeItem("adminToken");
                    localStorage.removeItem("admin");
                    alert("Your session has expired. Please login again.");
                    window.location.href = "../admin-login.html";
                    return;
                }

                if (response.ok && data.success) {
                    closeModal();
                    loadResources();
                    alert(data.message || "Resource saved successfully!");
                } else {
                    alert(data.error || data.details || "Failed to save resource. Please try again.");
                }
            } catch (err) {
                console.error("❌ Error saving resource:", err);
                alert("Server error. Please check the console for details.");
            }
        }

        function closeModal() {
            document.getElementById("resourceModal").classList.remove("active");
            editingResourceId = null;
            document.getElementById("resourceTitle").value = "";
            document.getElementById("resourceCategory").value = "";
            document.getElementById("resourceGrade").value = "";
            document.getElementById("resourceType").value = "";
            document.getElementById("resourceDesc").value = "";
            document.getElementById("resourceTypeSelector").value = "book";
            const fileInput = document.getElementById("resourceFile");
            if (fileInput) fileInput.value = "";
            document.getElementById("modalTitle").textContent = "Add Resource";
        }

        // Event Listeners
        document.getElementById("logoutBtn").addEventListener("click", (e) => {
            e.preventDefault();
            localStorage.removeItem("adminToken");
            localStorage.removeItem("admin");
            window.location.href = "../admin-login.html";
        });

        document.getElementById("addResourceBtn").addEventListener("click", () => {
            editingResourceId = null;
            document.getElementById("modalTitle").textContent = "Add Resource";
            document.getElementById("resourceModal").classList.add("active");
        });

        document.getElementById("saveResourceBtn").addEventListener("click", saveResource);
        document.getElementById("closeModalBtn").addEventListener("click", closeModal);

        // Initialize
        (async () => {
            const isAdmin = await checkAdminAccess();
            if (isAdmin) {
                await loadResources();
            }
        })();
    </script>
</body>
</html>
