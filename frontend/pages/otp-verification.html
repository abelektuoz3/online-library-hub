<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email | Online Library Hub</title>
    <meta
      name="description"
      content="Verify your email address to complete registration." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../style/style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #f5f7fa;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .navbar {
        background: white;
        border-bottom: 1px solid #e2e8f0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .nav-container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0.75rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo a {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1a1a2e;
        text-decoration: none;
      }

      .logo a span {
        color: #2563eb;
      }

      .nav-links {
        display: flex;
        list-style: none;
        gap: 1.75rem;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: #4a5568;
        font-weight: 500;
        font-size: 0.875rem;
        transition: color 0.2s;
      }

      .nav-links a:hover {
        color: #2563eb;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid #2563eb;
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
        color: #2563eb !important;
      }

      .btn-outline:hover {
        background: #eff6ff;
      }

      .btn-primary-nav {
        background: #2563eb;
        color: white !important;
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
      }

      .btn-primary-nav:hover {
        background: #1d4ed8;
      }

      .hamburger {
        display: none;
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #1a1a2e;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
      }

      .verify-card {
        max-width: 480px;
        width: 100%;
        background: white;
        border-radius: 1rem;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
        padding: 2rem;
      }

      .verify-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .verify-header h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 0.5rem;
      }

      .verify-header p {
        font-size: 0.875rem;
        color: #64748b;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #334155;
        margin-bottom: 0.5rem;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper i {
        position: absolute;
        left: 0.875rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 1rem;
      }

      .input-wrapper input {
        width: 100%;
        padding: 0.75rem 0.875rem 0.75rem 2.5rem;
        border: 1px solid #cbd5e1;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-family: "Inter", sans-serif;
        transition: all 0.2s;
        background: white;
        text-align: center;
        letter-spacing: 4px;
        font-size: 1.25rem;
        font-weight: 600;
      }

      .input-wrapper input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .btn-verify {
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        padding: 0.75rem;
        font-size: 0.875rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background 0.2s;
        font-family: "Inter", sans-serif;
      }

      .btn-verify:hover {
        background: #1d4ed8;
      }

      .btn-verify:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }

      .btn-resend {
        width: 100%;
        background: transparent;
        color: #2563eb;
        border: 1px solid #e2e8f0;
        padding: 0.75rem;
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 1rem;
      }

      .btn-resend:hover {
        background: #f8fafc;
        border-color: #2563eb;
      }

      .btn-resend:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .timer-text {
        text-align: center;
        font-size: 0.75rem;
        color: #94a3b8;
        margin-top: 0.75rem;
      }

      #form-message {
        margin-bottom: 1rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        text-align: center;
        display: none;
      }

      .message.success {
        display: block;
        background: #ecfdf5;
        color: #047857;
        border: 1px solid #a7f3d0;
      }

      .message.error {
        display: block;
        background: #fef2f2;
        color: #b91c1c;
        border: 1px solid #fecaca;
      }

      .message.info {
        display: block;
        background: #eff6ff;
        color: #1d4ed8;
        border: 1px solid #bfdbfe;
      }

      footer {
        background: white;
        border-top: 1px solid #e2e8f0;
        text-align: center;
        padding: 1.5rem;
        color: #64748b;
        font-size: 0.75rem;
      }

      @media (max-width: 768px) {
        .hamburger {
          display: block;
        }

        .nav-links {
          display: none;
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: white;
          flex-direction: column;
          padding: 1rem;
          gap: 1rem;
          border-bottom: 1px solid #e2e8f0;
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-links.active {
          display: flex;
        }

        .verify-card {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <a href="../index.html">Library<span>Hub</span></a>
        </div>
        <button class="hamburger" id="hamburger">☰</button>
        <ul class="nav-links" id="navLinks"></ul>
      </div>
    </nav>

    <main>
      <div class="verify-card">
        <div class="verify-header">
          <h1>Verify your email</h1>
          <p id="emailDisplay">We've sent a verification code to your email</p>
        </div>

        <div id="form-message"></div>

        <form id="verifyForm" novalidate>
          <div class="form-group">
            <label for="otp">Enter 6-digit code</label>
            <div class="input-wrapper">
              <i class="fas fa-key"></i>
              <input
                type="text"
                id="otp"
                name="otp"
                maxlength="6"
                placeholder="000000"
                required
                autocomplete="off" />
            </div>
          </div>

          <button type="submit" class="btn-verify" id="verifyBtn">
            Verify Email
          </button>
          <button type="button" class="btn-resend" id="resendBtn">
            Resend Code
          </button>
          <div class="timer-text" id="timerText"></div>
        </form>
      </div>
    </main>

    <footer>
      <p>
        &copy; <span id="current-year"></span> Online Library Hub. All rights
        reserved.
      </p>
    </footer>

    <script src="/scripts/api-config.js"></script>
    <script src="../scripts/main.js"></script>
    <script>
      // ===== FIX: REMOVED duplicate API_BASE_URL declaration =====
      // Use window.API_BASE directly
      console.log("🔐 OTP Verification page loaded");
      console.log("📡 API Base:", window.API_BASE);

      let countdownInterval;
      let canResend = true;
      let resendCountdown = 60;

      // Get email from URL parameter or localStorage
      const urlParams = new URLSearchParams(window.location.search);
      let userEmail = urlParams.get("email");
      let userName = urlParams.get("name");

      console.log("📧 Email from URL:", userEmail);
      console.log("👤 Name from URL:", userName);

      if (!userEmail) {
        userEmail = localStorage.getItem("pendingVerificationEmail");
        userName = localStorage.getItem("pendingVerificationName");
        console.log("📧 Email from localStorage:", userEmail);
      }

      if (!userEmail) {
        console.log("❌ No email found, redirecting to register");
        window.location.href = "register.html";
      }

      document.getElementById("emailDisplay").innerHTML =
        `We've sent a verification code to <strong>${userEmail}</strong>`;

      function showMessage(message, type) {
        const msgDiv = document.getElementById("form-message");
        msgDiv.className = "message " + type;
        msgDiv.innerHTML =
          '<i class="fas ' +
          (type === "success" ? "fa-check-circle"
          : type === "info" ? "fa-info-circle"
          : "fa-exclamation-circle") +
          '"></i> ' +
          message;
        msgDiv.style.display = "block";

        setTimeout(() => {
          msgDiv.style.display = "none";
        }, 5000);
      }

      function startResendTimer() {
        canResend = false;
        const resendBtn = document.getElementById("resendBtn");
        const timerText = document.getElementById("timerText");

        resendCountdown = 60;
        resendBtn.disabled = true;

        if (countdownInterval) clearInterval(countdownInterval);

        countdownInterval = setInterval(() => {
          if (resendCountdown <= 0) {
            clearInterval(countdownInterval);
            canResend = true;
            resendBtn.disabled = false;
            timerText.textContent = "";
          } else {
            timerText.textContent = `Resend code available in ${resendCountdown} seconds`;
            resendCountdown--;
          }
        }, 1000);
      }

      async function sendOTP() {
        console.log("📧 sendOTP function called for:", userEmail);

        try {
          showMessage("Sending verification code...", "info");

          // FIX: Use window.API_BASE directly
          const apiBase = window.API_BASE || "https://online-library-hub.onrender.com/api";
          const response = await fetch(apiBase + "/otp/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: userEmail,
              name: userName || "User",
            }),
          });

          const data = await response.json();
          console.log("📧 OTP response:", data);

          if (response.ok && data.success) {
            showMessage(
              "Verification code sent! Check your email or terminal for the code.",
              "success",
            );
            startResendTimer();
          } else {
            console.error("OTP send error:", data);
            showMessage(
              data.error ||
                "Failed to send verification code. Please try again.",
              "error",
            );
          }
        } catch (err) {
          console.error("Error sending OTP:", err);
          showMessage(
            "Server error. Please make sure the backend is running on port 5000.",
            "error",
          );
        }
      }

      // Resend button handler
      document.getElementById("resendBtn").addEventListener("click", () => {
        if (canResend) {
          sendOTP();
        }
      });

      // Verify form handler
      const verifyForm = document.getElementById("verifyForm");
      if (verifyForm) {
        verifyForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const otp = document.getElementById("otp").value.trim();
          console.log("🔐 Verifying OTP:", otp);

          if (!otp || otp.length !== 6) {
            showMessage("Please enter the 6-digit verification code", "error");
            return;
          }

          const verifyBtn = document.getElementById("verifyBtn");
          verifyBtn.disabled = true;
          verifyBtn.textContent = "Verifying...";

          try {
            // FIX: Use window.API_BASE directly
            const apiBase = window.API_BASE || "https://online-library-hub.onrender.com/api";
            const response = await fetch(apiBase + "/otp/verify", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email: userEmail, otp: otp }),
            });

            const data = await response.json();
            console.log("🔐 Verification response:", data);

            if (response.ok && data.success) {
              showMessage(
                "Email verified successfully! Redirecting to login...",
                "success",
              );

              // Clear pending verification
              localStorage.removeItem("pendingVerificationEmail");
              localStorage.removeItem("pendingVerificationName");

              setTimeout(() => {
                window.location.href = "login.html?verified=1";
              }, 2000);
            } else {
              showMessage(
                data.error || "Invalid verification code. Please try again.",
                "error",
              );
              verifyBtn.disabled = false;
              verifyBtn.textContent = "Verify Email";
            }
          } catch (err) {
            console.error("Verification error:", err);
            showMessage("Server error. Please try again.", "error");
            verifyBtn.disabled = false;
            verifyBtn.textContent = "Verify Email";
          }
        });
      }

      // Auto-send initial OTP when page loads
      console.log("🔄 Auto-sending OTP on page load...");
      setTimeout(() => {
        sendOTP();
      }, 1000);

      document.getElementById("current-year").textContent =
        new Date().getFullYear();
    </script>
  </body>
</html>
