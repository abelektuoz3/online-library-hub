<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | Online Library Hub</title>
    <meta
      name="description"
      content="Create your free Online Library Hub account and join thousands of learners worldwide." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../style/style.css" />
    <style>
      /* ===== Reset & Base ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #f5f7fa;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ===== Navbar ===== */
      .navbar {
        background: white;
        border-bottom: 1px solid #e2e8f0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .nav-container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0.75rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo a {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1a1a2e;
        text-decoration: none;
      }

      .logo a span {
        color: #2563eb;
      }

      .nav-links {
        display: flex;
        list-style: none;
        gap: 1.75rem;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: #4a5568;
        font-weight: 500;
        font-size: 0.875rem;
        transition: color 0.2s;
      }

      .nav-links a:hover {
        color: #2563eb;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid #2563eb;
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
        color: #2563eb !important;
      }

      .btn-outline:hover {
        background: #eff6ff;
      }

      .btn-primary-nav {
        background: #2563eb;
        color: white !important;
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
      }

      .btn-primary-nav:hover {
        background: #1d4ed8;
      }

      .hamburger {
        display: none;
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #1a1a2e;
      }

      /* ===== Main Layout ===== */
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
      }

      /* ===== Register Card ===== */
      .register-card {
        max-width: 480px;
        width: 100%;
        background: white;
        border-radius: 1rem;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
        padding: 2rem;
      }

      .register-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .register-header h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 0.5rem;
      }

      .register-header p {
        font-size: 0.875rem;
        color: #64748b;
      }

      /* ===== Form Elements ===== */
      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-group label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #334155;
        margin-bottom: 0.5rem;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper i {
        position: absolute;
        left: 0.875rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 1rem;
      }

      .input-wrapper input {
        width: 100%;
        padding: 0.625rem 0.875rem 0.625rem 2.5rem;
        border: 1px solid #cbd5e1;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-family: "Inter", sans-serif;
        transition: all 0.2s;
        background: white;
      }

      .input-wrapper input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .input-wrapper .toggle-password {
        position: absolute;
        right: 0.875rem;
        left: auto;
        cursor: pointer;
        color: #94a3b8;
      }

      .toggle-password:hover {
        color: #64748b;
      }

      .form-group small {
        display: block;
        margin-top: 0.375rem;
        font-size: 0.75rem;
        color: #64748b;
      }

      /* ===== Password Strength ===== */
      .password-strength {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }

      .strength-bar {
        flex: 1;
        height: 4px;
        background: #e2e8f0;
        border-radius: 4px;
        transition: all 0.3s;
      }

      .strength-bar.weak {
        background: #ef4444;
      }

      .strength-bar.medium {
        background: #f59e0b;
      }

      .strength-bar.strong {
        background: #10b981;
      }

      .strength-label {
        font-size: 0.7rem;
        margin-top: 0.25rem;
        font-weight: 500;
      }

      .strength-label.weak { color: #ef4444; }
      .strength-label.medium { color: #f59e0b; }
      .strength-label.strong { color: #10b981; }

      /* ===== Checkbox ===== */
      .checkbox {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        color: #475569;
        font-size: 0.875rem;
      }

      .checkbox input {
        width: 1rem;
        height: 1rem;
        cursor: pointer;
        accent-color: #2563eb;
      }

      .checkbox a {
        color: #2563eb;
        text-decoration: none;
      }

      .checkbox a:hover {
        text-decoration: underline;
      }

      .terms-group {
        margin: 1.5rem 0;
      }

      /* ===== Button ===== */
      .btn-register {
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        padding: 0.75rem;
        font-size: 0.875rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background 0.2s;
        font-family: "Inter", sans-serif;
      }

      .btn-register:hover {
        background: #1d4ed8;
      }

      .btn-register:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }

      /* ===== Divider ===== */
      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 1.5rem 0;
        color: #94a3b8;
        font-size: 0.75rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #e2e8f0;
      }

      .divider span {
        padding: 0 0.75rem;
      }

      /* ===== Social Buttons ===== */
      .social-buttons {
        display: flex;
        gap: 1rem;
      }

      .social-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.625rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        background: white;
        font-size: 0.875rem;
        font-weight: 500;
        color: #334155;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Inter", sans-serif;
      }

      .social-btn:hover {
        background: #f8fafc;
        border-color: #cbd5e1;
      }

      /* ===== Login Link ===== */
      .login-link {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e2e8f0;
        font-size: 0.875rem;
        color: #475569;
      }

      .login-link a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      .login-link a:hover {
        text-decoration: underline;
      }

      /* ===== Message ===== */
      #form-message {
        margin-bottom: 1rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        text-align: center;
        display: none;
      }

      .message.success {
        display: block;
        background: #ecfdf5;
        color: #047857;
        border: 1px solid #a7f3d0;
      }

      .message.error {
        display: block;
        background: #fef2f2;
        color: #b91c1c;
        border: 1px solid #fecaca;
      }

      /* ===== Field error ===== */
      .field-error {
        font-size: 0.75rem;
        color: #b91c1c;
        margin-top: 0.25rem;
        display: none;
      }

      .input-wrapper input.input-error {
        border-color: #ef4444;
      }

      /* ===== Footer ===== */
      footer {
        background: white;
        border-top: 1px solid #e2e8f0;
        text-align: center;
        padding: 1.5rem;
        color: #64748b;
        font-size: 0.75rem;
      }

      /* ===== Responsive ===== */
      @media (max-width: 768px) {
        .hamburger {
          display: block;
        }

        .nav-links {
          display: none;
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: white;
          flex-direction: column;
          padding: 1rem;
          gap: 1rem;
          border-bottom: 1px solid #e2e8f0;
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-links.active {
          display: flex;
        }

        .register-card {
          padding: 1.5rem;
        }

        .social-buttons {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <a href="../index.html">Library<span>Hub</span></a>
        </div>
        <button class="hamburger" id="hamburger">☰</button>
        <ul class="nav-links" id="navLinks"></ul>
      </div>
    </nav>

    <main>
      <div class="register-card">
        <div class="register-header">
          <h1>Create an account</h1>
          <p>Join thousands of learners worldwide</p>
        </div>

        <div id="form-message"></div>

        <form id="registerForm" novalidate>
          <div class="form-group">
            <label for="name">Full name</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="John Doe"
                required
                autocomplete="name" />
            </div>
            <div class="field-error" id="name-error"></div>
          </div>

          <div class="form-group">
            <label for="email">Email address</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
                autocomplete="email" />
            </div>
            <div class="field-error" id="email-error"></div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Create a password"
                required
                autocomplete="new-password" />
              <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>
            <div class="password-strength" id="passwordStrength">
              <div class="strength-bar" id="bar1"></div>
              <div class="strength-bar" id="bar2"></div>
              <div class="strength-bar" id="bar3"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
            <small>Minimum 4 characters</small>
            <div class="field-error" id="password-error"></div>
          </div>

          <div class="form-group">
            <label for="confirm_password">Confirm password</label>
            <div class="input-wrapper">
              <i class="fas fa-check-circle"></i>
              <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                placeholder="Confirm your password"
                required
                autocomplete="new-password" />
              <i
                class="fas fa-eye toggle-password"
                id="toggleConfirmPassword"></i>
            </div>
            <div class="field-error" id="confirm-password-error"></div>
          </div>

          <div class="terms-group">
            <label class="checkbox">
              <input type="checkbox" id="termsCheckbox" required />
              I agree to the <a href="#">Terms of Service</a> and
              <a href="#">Privacy Policy</a>
            </label>
            <div class="field-error" id="terms-error"></div>
          </div>

          <button type="submit" class="btn-register" id="registerBtn">
            Create account
          </button>
        </form>

        <div class="divider">
          <span>OR</span>
        </div>

        <div class="social-buttons">
          <button type="button" class="social-btn" id="googleRegisterBtn">
            <i class="fab fa-google"></i> Google
          </button>
          <button type="button" class="social-btn" id="githubRegisterBtn">
            <i class="fab fa-github"></i> GitHub
          </button>
        </div>

        <div class="login-link">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </main>

    <footer>
      <p>
        &copy; <span id="current-year"></span> Online Library Hub. All rights
        reserved.
      </p>
    </footer>

    <script src="/scripts/api-config.js"></script>
    <script>
      // ===== ALL SCRIPTS INLINE - NO DUPLICATES =====
      console.log("📝 Register page loaded");

      console.log("📡 API Base:", window.API_BASE);

      // ==================== NAVBAR ====================
      function renderNavbar() {
        var navLinks = document.getElementById("navLinks");
        if (!navLinks) return;

        var token = localStorage.getItem("token");
        var user = localStorage.getItem("user");
        var isLoggedIn = !!(token && user);

        if (isLoggedIn) {
          navLinks.innerHTML = `
            <li><a href="../index.html">Home</a></li>
            <li><a href="catalog.html">Catalog</a></li>
            <li><a href="study-tools.html">Study Tools</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="#" id="logoutBtn" style="color:#dc2626;">Logout</a></li>
          `;
          var logoutBtn = document.getElementById("logoutBtn");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", function (e) {
              e.preventDefault();
              localStorage.removeItem("token");
              localStorage.removeItem("user");
              window.location.href = "../index.html";
            });
          }
        } else {
          navLinks.innerHTML = `
            <li><a href="../index.html">Home</a></li>
            <li><a href="catalog.html">Catalog</a></li>
            <li><a href="study-tools.html">Study Tools</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="login.html" class="btn-outline">Sign In</a></li>
            <li><a href="register.html" class="btn-primary-nav">Join Free</a></li>
          `;
        }

        var hamburger = document.getElementById("hamburger");
        if (hamburger) {
          hamburger.addEventListener("click", function () {
            navLinks.classList.toggle("active");
          });
        }
      }

      // ==================== PASSWORD TOGGLE & STRENGTH ====================
      (function () {
        var pwdInput = document.getElementById("password");
        var confirmInput = document.getElementById("confirm_password");
        var togglePwd = document.getElementById("togglePassword");
        var toggleConfirm = document.getElementById("toggleConfirmPassword");

        if (togglePwd && pwdInput) {
          togglePwd.addEventListener("click", function () {
            var type = pwdInput.type === "password" ? "text" : "password";
            pwdInput.type = type;
            this.classList.toggle("fa-eye");
            this.classList.toggle("fa-eye-slash");
          });
        }

        if (toggleConfirm && confirmInput) {
          toggleConfirm.addEventListener("click", function () {
            var type = confirmInput.type === "password" ? "text" : "password";
            confirmInput.type = type;
            this.classList.toggle("fa-eye");
            this.classList.toggle("fa-eye-slash");
          });
        }

        var bars = document.querySelectorAll(".strength-bar");
        var strengthLabel = document.getElementById("strengthLabel");

        function checkStrength(password) {
          var strength = 0;
          if (password.length >= 4) strength = 1;
          if (password.length >= 8) strength = 2;
          if (password.length >= 12 && /[A-Z]/.test(password) && /[0-9]/.test(password)) strength = 3;

          var labels = ["", "Weak", "Medium", "Strong"];
          var classes = ["", "weak", "medium", "strong"];

          bars.forEach(function (bar, i) {
            bar.className = "strength-bar";
            if (i < strength) {
              bar.classList.add(classes[strength]);
            }
          });

          if (strengthLabel) {
            strengthLabel.textContent = password.length > 0 ? labels[strength] : "";
            strengthLabel.className = "strength-label" + (strength > 0 ? " " + classes[strength] : "");
          }
        }

        if (pwdInput) {
          pwdInput.addEventListener("input", function () {
            checkStrength(this.value);
          });
        }

        if (confirmInput && pwdInput) {
          confirmInput.addEventListener("input", function () {
            if (this.value.length === 0) {
              this.style.borderColor = "";
            } else if (pwdInput.value !== this.value) {
              this.style.borderColor = "#ef4444";
            } else {
              this.style.borderColor = "#10b981";
            }
          });
        }
      })();

      // ==================== MESSAGE HELPER ====================
      function showMessage(message, type, containerId) {
        containerId = containerId || "form-message";
        var msgDiv = document.getElementById(containerId);
        if (!msgDiv) {
          msgDiv = document.createElement("div");
          msgDiv.id = containerId;
          var form = document.querySelector("form");
          if (form) {
            form.parentNode.insertBefore(msgDiv, form);
          }
        }
        msgDiv.className = "message " + type;
        msgDiv.style.display = "block";
        var icon = type === "success" ? "fa-check-circle" : "fa-exclamation-circle";
        msgDiv.innerHTML = '<i class="fas ' + icon + '"></i> ' + message;

        setTimeout(function () {
          if (msgDiv) {
            msgDiv.style.display = "none";
          }
        }, 5000);
      }

      function showFieldError(fieldId, message) {
        var errorDiv = document.getElementById(fieldId + "-error");
        if (errorDiv) {
          errorDiv.textContent = message;
          errorDiv.style.display = "block";
        }
        var input = document.getElementById(fieldId);
        if (input) {
          input.classList.add("input-error");
        }
      }

      function clearFieldError(fieldId) {
        var errorDiv = document.getElementById(fieldId + "-error");
        if (errorDiv) {
          errorDiv.textContent = "";
          errorDiv.style.display = "none";
        }
        var input = document.getElementById(fieldId);
        if (input) {
          input.classList.remove("input-error");
        }
      }

      function clearAllFieldErrors() {
        var fields = ["name", "email", "password", "confirm_password", "terms"];
        fields.forEach(function (field) {
          clearFieldError(field);
        });
      }

      var EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      // ==================== REGISTRATION FORM ====================
      var registerForm = document.getElementById("registerForm");
      if (registerForm) {
        console.log("✅ registerForm found");

        registerForm.addEventListener("submit", async function (e) {
          e.preventDefault();
          e.stopPropagation();

          console.log("📝 Registration form submitted - preventing default");

          clearAllFieldErrors();

          var nameInput = document.getElementById("name");
          var emailInput = document.getElementById("email");
          var passwordInput = document.getElementById("password");
          var confirmInput = document.getElementById("confirm_password");
          var termsCheckbox = document.getElementById("termsCheckbox");
          var submitBtn = document.getElementById("registerBtn");

          var name = nameInput ? nameInput.value.trim() : "";
          var email = emailInput ? emailInput.value.trim() : "";
          var password = passwordInput ? passwordInput.value : "";
          var confirmPassword = confirmInput ? confirmInput.value : "";

          var hasError = false;

          if (!name) {
            showFieldError("name", "Full name is required");
            hasError = true;
          } else if (name.length < 2) {
            showFieldError("name", "Name must be at least 2 characters");
            hasError = true;
          }

          if (!email) {
            showFieldError("email", "Email is required");
            hasError = true;
          } else if (!EMAIL_REGEX.test(email)) {
            showFieldError("email", "Please enter a valid email address");
            hasError = true;
          }

          if (!password) {
            showFieldError("password", "Password is required");
            hasError = true;
          } else if (password.length < 4) {
            showFieldError("password", "Password must be at least 4 characters");
            hasError = true;
          }

          if (!confirmPassword) {
            showFieldError("confirm_password", "Please confirm your password");
            hasError = true;
          } else if (password !== confirmPassword) {
            showFieldError("confirm_password", "Passwords do not match");
            hasError = true;
          }

          if (termsCheckbox && !termsCheckbox.checked) {
            showFieldError("terms", "You must agree to the Terms of Service");
            hasError = true;
          }

          if (hasError) {
            showMessage("Please fix the errors below", "error");
            return;
          }

          if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.textContent = "Creating account...";
          }

          try {
            var apiBase = window.API_BASE || "https://online-library-hub.onrender.com/api";
            console.log("📡 Sending registration request to:", apiBase + "/auth/register");

            var response = await fetch(apiBase + "/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                name: name,
                email: email,
                password: password,
                confirm_password: confirmPassword,
              }),
            });

            var data = await response.json();
            console.log("📨 Registration response:", data);

            if (response.ok && data.success) {
              localStorage.setItem("pendingVerificationEmail", email);
              localStorage.setItem("pendingVerificationName", name);

              // ===== FIX: SEND OTP IMMEDIATELY =====
              console.log("📧 Sending OTP to:", email);
              try {
                const otpResponse = await fetch(apiBase + "/otp/send", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    email: email,
                    name: name
                  }),
                });
                const otpData = await otpResponse.json();
                console.log("📧 OTP Response:", otpData);
                
                if (otpResponse.ok && otpData.success) {
                  showMessage("Account created! Please check your email for the verification code.", "success");
                } else {
                  console.error("OTP send error:", otpData);
                  showMessage("Account created! But we couldn't send the verification code. Please use the resend button.", "error");
                }
              } catch (otpErr) {
                console.error("❌ OTP send error:", otpErr);
                showMessage("Account created! But we couldn't send the verification code. Please use the resend button.", "error");
              }

              setTimeout(function () {
                window.location.href = `otp-verification.html?email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}`;
              }, 1500);
            } else {
              showMessage(data.error || "Registration failed", "error");
              if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.textContent = "Create account";
              }
            }
          } catch (err) {
            console.error("Registration error:", err);
            showMessage("Server error. Please make sure the backend is running.", "error");
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.textContent = "Create account";
            }
          }
        });
      } else {
        console.error("❌ registerForm not found!");
      }
