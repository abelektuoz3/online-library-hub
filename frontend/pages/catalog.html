<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resource Catalog | Online Library Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
        }

        .catalog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .catalog-header {
            margin-bottom: 2rem;
        }

        .catalog-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .catalog-header p {
            color: #64748b;
            font-size: 1rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            background: white;
            padding: 1.25rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
        }

        .filters input,
        .filters select {
            padding: 0.625rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
            flex: 1;
            min-width: 150px;
        }

        .filters input:focus,
        .filters select:focus {
            border-color: #2563eb;
        }

        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .resource-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.2s;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .resource-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .resource-card .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .badge-available {
            background: #ecfdf5;
            color: #047857;
        }

        .badge-unavailable {
            background: #fef2f2;
            color: #b91c1c;
        }

        .resource-card h3 {
            font-size: 1.125rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.25rem;
        }

        .resource-card .author {
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }

        .resource-card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .resource-card .meta span {
            background: #f1f5f9;
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            color: #475569;
        }

        .resource-card .description {
            color: #4b5563;
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .resource-card .actions {
            display: flex;
            gap: 0.75rem;
        }

        .resource-card .actions button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-view {
            background: #2563eb;
            color: white;
        }

        .btn-view:hover {
            background: #1d4ed8;
        }

        .btn-download {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-download:hover {
            background: #e2e8f0;
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .loading-spinner i {
            font-size: 2rem;
            margin-bottom: 1rem;
            display: block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            grid-column: 1 / -1;
        }

        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            color: #cbd5e1;
        }

        @media (max-width: 768px) {
            .catalog-container {
                padding: 1rem;
            }
            .filters {
                flex-direction: column;
            }
            .filters input,
            .filters select {
                width: 100%;
            }
            .resources-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="catalog-container">
        <!-- Header -->
        <div class="catalog-header">
            <h1>📚 Resource Catalog</h1>
            <p>Browse our collection of books, e-books, and learning materials</p>
        </div>

        <!-- Filters -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search by title or description..." />
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Fiction">Fiction</option>
                <option value="Non-Fiction">Non-Fiction</option>
                <option value="Programming">Programming</option>
                <option value="History">History</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
                <option value="Arts">Arts</option>
                <option value="Technology">Technology</option>
                <option value="Other">Other</option>
            </select>
            <select id="gradeFilter">
                <option value="">All Grade Levels</option>
                <option value="Grade 8-10">Grade 8-10</option>
                <option value="Grade 9-11">Grade 9-11</option>
                <option value="Grade 9-12">Grade 9-12</option>
                <option value="Grade 10-12">Grade 10-12</option>
                <option value="Grade 11-12">Grade 11-12</option>
                <option value="College">College</option>
                <option value="University">University</option>
                <option value="Other">Other</option>
            </select>
            <select id="typeFilter">
                <option value="">All Types</option>
                <option value="Book">Book</option>
                <option value="E-Book">E-Book</option>
                <option value="Textbook">Textbook</option>
                <option value="Reference">Reference</option>
                <option value="Lab Manual">Lab Manual</option>
                <option value="Video">Video</option>
                <option value="Audio">Audio</option>
                <option value="Course">Course</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <!-- Resources Grid -->
        <div class="resources-grid" id="resourcesGrid">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <p>Loading resources...</p>
            </div>
        </div>
    </div>

    <script src="/scripts/api-config.js"></script>
    <script>
        const API_BASE = window.API_BASE || 'https://online-library-hub.onrender.com/api';
        let allResources = [];
        let filteredResources = [];

        // ==================== FETCH RESOURCES FROM DATABASE ====================
        async function fetchResources() {
            const grid = document.getElementById('resourcesGrid');
            grid.innerHTML = `
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                    <p>Loading resources...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE}/catalog`, {
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch resources');
                }

                const data = await response.json();
                
                // Handle different response formats
                if (data.success && data.books) {
                    allResources = data.books;
                } else if (data.success && data.resources) {
                    allResources = data.resources;
                } else if (Array.isArray(data)) {
                    allResources = data;
                } else {
                    allResources = [];
                }

                console.log('📚 Resources loaded:', allResources.length);
                filteredResources = [...allResources];
                renderResources(filteredResources);

            } catch (error) {
                console.error('Error fetching resources:', error);
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Error Loading Resources</h3>
                        <p>${error.message || 'Please try again later.'}</p>
                        <button onclick="fetchResources()" style="margin-top: 1rem; padding: 0.625rem 1.25rem; background: #2563eb; color: white; border: none; border-radius: 0.5rem; cursor: pointer;">
                            <i class="fas fa-redo"></i> Retry
                        </button>
                    </div>
                `;
            }
        }

        // ==================== RENDER RESOURCES ====================
        function renderResources(resources) {
            const grid = document.getElementById('resourcesGrid');

            if (!resources || resources.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-book-open"></i>
                        <h3>No Resources Found</h3>
                        <p>No resources match your search criteria.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = resources.map(resource => {
                const isAvailable = resource.available !== false;
                const statusBadge = isAvailable 
                    ? '<span class="badge badge-available">✅ Available</span>'
                    : '<span class="badge badge-unavailable">❌ Unavailable</span>';

                // Get the ID (works with both _id and id)
                const resourceId = resource._id || resource.id;

                return `
                    <div class="resource-card">
                        ${statusBadge}
                        <h3>${escapeHtml(resource.title || 'Untitled')}</h3>
                        <div class="author">✍️ ${escapeHtml(resource.author || 'Unknown Author')}</div>
                        <div class="meta">
                            <span>📂 ${escapeHtml(resource.category || 'Uncategorized')}</span>
                            <span>📚 ${escapeHtml(resource.grade_level || 'All Levels')}</span>
                            <span>📖 ${escapeHtml(resource.resource_type || 'Other')}</span>
                        </div>
                        <div class="description">${escapeHtml(resource.description || 'No description available.')}</div>
                        <div class="actions">
                            <button class="btn-view" onclick="viewResource('${resourceId}')">
                                <i class="fas fa-eye"></i> View
                            </button>
                            <button class="btn-download" onclick="downloadResource('${resourceId}')">
                                <i class="fas fa-download"></i> Download
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== FILTER RESOURCES ====================
        function filterResources() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const category = document.getElementById('categoryFilter').value;
            const grade = document.getElementById('gradeFilter').value;
            const type = document.getElementById('typeFilter').value;

            filteredResources = allResources.filter(resource => {
                // Search filter
                let matchesSearch = true;
                if (searchTerm) {
                    matchesSearch = 
                        (resource.title || '').toLowerCase().includes(searchTerm) ||
                        (resource.description || '').toLowerCase().includes(searchTerm) ||
                        (resource.author || '').toLowerCase().includes(searchTerm);
                }

                // Category filter
                let matchesCategory = true;
                if (category) {
                    matchesCategory = (resource.category || '') === category;
                }

                // Grade filter
                let matchesGrade = true;
                if (grade) {
                    matchesGrade = (resource.grade_level || '') === grade;
                }

                // Type filter
                let matchesType = true;
                if (type) {
                    matchesType = (resource.resource_type || '') === type;
                }

                return matchesSearch && matchesCategory && matchesGrade && matchesType;
            });

            renderResources(filteredResources);
        }

        // ==================== VIEW RESOURCE ====================
        window.viewResource = function(id) {
            const resource = allResources.find(r => (r._id || r.id) === id);
            if (resource) {
                alert(`📖 ${resource.title}\n\nAuthor: ${resource.author}\nCategory: ${resource.category}\nGrade Level: ${resource.grade_level}\nType: ${resource.resource_type}\n\nDescription:\n${resource.description || 'No description available.'}`);
            } else {
                alert('Resource not found.');
            }
        };

        // ==================== DOWNLOAD RESOURCE ====================
        window.downloadResource = function(id) {
            const resource = allResources.find(r => (r._id || r.id) === id);
            if (resource && resource.fileUrl) {
                window.open(resource.fileUrl, '_blank');
            } else {
                alert('Download URL not available for this resource.');
            }
        };

        // ==================== ESCAPE HTML ====================
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('searchInput').addEventListener('input', filterResources);
        document.getElementById('categoryFilter').addEventListener('change', filterResources);
        document.getElementById('gradeFilter').addEventListener('change', filterResources);
        document.getElementById('typeFilter').addEventListener('change', filterResources);

        // ==================== INITIALIZE ====================
        document.addEventListener('DOMContentLoaded', () => {
            fetchResources();
        });
    </script>
</body>
</html>
