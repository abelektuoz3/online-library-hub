<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalog | Online Library Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../style/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1a1a2e;
            text-decoration: none;
        }

        .navbar-brand span {
            color: #2563eb;
        }

        .navbar-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .navbar-links a {
            color: #4b5563;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .navbar-links a:hover {
            color: #2563eb;
        }

        .navbar-links a.active {
            color: #2563eb;
            font-weight: 600;
        }

        .catalog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .catalog-header {
            margin-bottom: 2rem;
        }

        .catalog-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .catalog-header p {
            color: #64748b;
            font-size: 1rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            background: white;
            padding: 1.25rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .filters input,
        .filters select {
            padding: 0.625rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
            flex: 1;
            min-width: 150px;
            background: white;
        }

        .filters input:focus,
        .filters select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .resource-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.2s;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .resource-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .resource-thumbnail {
            height: 160px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .resource-thumbnail i {
            font-size: 3rem;
            color: white;
            opacity: 0.8;
        }

        .resource-thumbnail .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
        }

        .resource-thumbnail .type-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .type-badge-book {
            background: rgba(37, 99, 235, 0.8);
            color: white;
        }

        .type-badge-course {
            background: rgba(236, 72, 153, 0.8);
            color: white;
        }

        .resource-body {
            padding: 1.5rem;
        }

        .resource-body h3 {
            font-size: 1.125rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .resource-body .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .resource-body .meta span {
            background: #f1f5f9;
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            color: #475569;
        }

        .resource-body .description {
            color: #4b5563;
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .resource-body .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
        }

        .resource-body .footer .status {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .status-available {
            color: #10b981;
        }

        .status-unavailable {
            color: #ef4444;
        }

        .btn-view {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-view:hover {
            background: #1d4ed8;
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            grid-column: 1 / -1;
        }

        .loading-spinner i {
            font-size: 2rem;
            margin-bottom: 1rem;
            display: block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            grid-column: 1 / -1;
        }

        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            color: #cbd5e1;
        }

        .btn-retry {
            margin-top: 1rem;
            padding: 0.625rem 1.25rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-retry:hover {
            background: #1d4ed8;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            .navbar-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .catalog-container {
                padding: 1rem;
            }
            .filters {
                flex-direction: column;
            }
            .filters input,
            .filters select {
                width: 100%;
            }
            .resources-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">Library<span>Hub</span></a>
        <div class="navbar-links">
            <a href="../index.html">Home</a>
            <a href="catalog.html" class="active">Catalog</a>
            <a href="admin/admin-dashboard.html">Admin</a>
            <a href="../index.html#contact">Contact</a>
        </div>
    </nav>

    <div class="catalog-container">
        <!-- Header -->
        <div class="catalog-header">
            <h1>📚 Resource Catalog</h1>
            <p>Browse our collection of books, courses, and learning materials</p>
        </div>

        <!-- Filters -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search by title or description..." />
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Fiction">Fiction</option>
                <option value="Non-Fiction">Non-Fiction</option>
                <option value="Programming">Programming</option>
                <option value="History">History</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
                <option value="Arts">Arts</option>
                <option value="Technology">Technology</option>
                <option value="Other">Other</option>
            </select>
            <select id="gradeFilter">
                <option value="">All Grade Levels</option>
                <option value="Grade 8-10">Grade 8-10</option>
                <option value="Grade 9-11">Grade 9-11</option>
                <option value="Grade 9-12">Grade 9-12</option>
                <option value="Grade 10-12">Grade 10-12</option>
                <option value="Grade 11-12">Grade 11-12</option>
                <option value="College">College</option>
                <option value="University">University</option>
                <option value="Other">Other</option>
            </select>
            <select id="typeFilter">
                <option value="">All Types</option>
                <option value="book">📚 Books</option>
                <option value="course">🎓 Courses</option>
            </select>
        </div>

        <!-- Resources Grid -->
        <div class="resources-grid" id="resourcesGrid">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <p>Loading resources...</p>
            </div>
        </div>
    </div>

    <script src="../scripts/api-config.js"></script>
    <script>
        const API_BASE = window.API_BASE || "https://online-library-hub.onrender.com/api";
        let allResources = [];

        async function fetchResources() {
            const grid = document.getElementById('resourcesGrid');
            grid.innerHTML = `
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                    <p>Loading resources...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE}/catalog`, {
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error('Failed to fetch resources');

                const data = await response.json();
                console.log('📦 Catalog data:', data);

                let resources = [];

                // Handle different response formats
                if (data.success && data.resources) {
                    resources = data.resources;
                    console.log('📚 Found resources in data.resources:', resources.length);
                } else if (data.success && data.books) {
                    resources = data.books.map(b => ({ ...b, resourceType: 'book' }));
                } else if (Array.isArray(data)) {
                    resources = data;
                } else {
                    // Try to extract any array from the response
                    for (const key in data) {
                        if (Array.isArray(data[key])) {
                            resources = data[key];
                            break;
                        }
                    }
                }

                allResources = resources;
                renderResources(resources);

            } catch (error) {
                console.error('Error fetching resources:', error);
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Error Loading Resources</h3>
                        <p>${error.message || 'Please try again later.'}</p>
                        <button class="btn-retry" onclick="fetchResources()">
                            <i class="fas fa-redo"></i> Retry
                        </button>
                    </div>
                `;
            }
        }

        function renderResources(resources) {
            const grid = document.getElementById('resourcesGrid');

            if (!resources || resources.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-book-open"></i>
                        <h3>No Resources Found</h3>
                        <p>No resources match your search criteria.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = resources.map(resource => {
                const isAvailable = resource.available !== false;
                const resourceType = resource.resourceType || 'book';
                const isCourse = resourceType === 'course';
                
                const typeBadgeClass = isCourse ? 'type-badge-course' : 'type-badge-book';
                const typeIcon = isCourse ? 'fa-graduation-cap' : 'fa-book';
                const typeLabel = isCourse ? 'Course' : 'Book';
                
                const gradeDisplay = resource.grade_level || resource.grade || 'All Levels';
                const category = resource.category || 'General';
                const resourceId = resource._id || resource.id;

                return `
                    <div class="resource-card">
                        <div class="resource-thumbnail" style="background: ${isCourse ? 'linear-gradient(135deg, #ec4899, #8b5cf6)' : 'linear-gradient(135deg, #667eea, #764ba2)'}">
                            <i class="fas ${typeIcon}"></i>
                            <span class="type-badge ${typeBadgeClass}">${typeLabel}</span>
                            <span class="badge">${isAvailable ? '✅ Available' : '❌ Unavailable'}</span>
                        </div>
                        <div class="resource-body">
                            <h3>${escapeHtml(resource.title || 'Untitled')}</h3>
                            <div class="meta">
                                <span>📂 ${escapeHtml(category)}</span>
                                <span>📚 ${escapeHtml(gradeDisplay)}</span>
                                <span>📖 ${escapeHtml(resource.resource_type || resource.type || typeLabel)}</span>
                            </div>
                            <div class="description">${escapeHtml(resource.description || 'No description available.')}</div>
                            <div class="footer">
                                <span class="status ${isAvailable ? 'status-available' : 'status-unavailable'}">
                                    ${isAvailable ? 'Available' : 'Unavailable'}
                                </span>
                                <button class="btn-view" onclick="viewResource('${resourceId}')">
                                    <i class="fas fa-eye"></i> View
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterResources() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const category = document.getElementById('categoryFilter').value;
            const grade = document.getElementById('gradeFilter').value;
            const type = document.getElementById('typeFilter').value;

            let filtered = allResources.filter(resource => {
                let matchesSearch = true;
                if (searchTerm) {
                    matchesSearch = 
                        (resource.title || '').toLowerCase().includes(searchTerm) ||
                        (resource.description || '').toLowerCase().includes(searchTerm) ||
                        (resource.author || '').toLowerCase().includes(searchTerm);
                }

                let matchesCategory = true;
                if (category) {
                    matchesCategory = (resource.category || '') === category;
                }

                let matchesGrade = true;
                if (grade) {
                    const resourceGrade = resource.grade_level || resource.grade || '';
                    matchesGrade = resourceGrade === grade;
                }

                let matchesType = true;
                if (type) {
                    const resourceType = resource.resourceType || 'book';
                    matchesType = resourceType === type;
                }

                return matchesSearch && matchesCategory && matchesGrade && matchesType;
            });

            renderResources(filtered);
        }

        window.viewResource = function(id) {
            const resource = allResources.find(r => (r._id || r.id) === id);
            if (resource) {
                const isCourse = resource.resourceType === 'course';
                const details = `
📖 ${resource.title}

${isCourse ? '🎓 Course' : '📚 Book'}
📂 Category: ${resource.category || 'General'}
📚 Grade Level: ${resource.grade_level || resource.grade || 'All Levels'}
📖 Type: ${resource.resource_type || resource.type || (isCourse ? 'Course' : 'Book')}

📝 Description:
${resource.description || 'No description available.'}

${isCourse ? `📊 Total Lessons: ${resource.totalLessons || 0}` : `✍️ Author: ${resource.author || 'Unknown'}`}
${resource.price ? `💰 Price: $${resource.price}` : ''}
`;
                alert(details);
            } else {
                alert('Resource not found.');
            }
        };

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', filterResources);
        document.getElementById('categoryFilter').addEventListener('change', filterResources);
        document.getElementById('gradeFilter').addEventListener('change', filterResources);
        document.getElementById('typeFilter').addEventListener('change', filterResources);

        // Initialize
        document.addEventListener('DOMContentLoaded', fetchResources);
    </script>
</body>
</html>
