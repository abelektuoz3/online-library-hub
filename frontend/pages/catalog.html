<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Catalog | Online Library Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../style/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1a1a2e;
            text-decoration: none;
        }

        .navbar-brand span {
            color: #2563eb;
        }

        .navbar-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .navbar-links a {
            color: #4b5563;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .navbar-links a:hover {
            color: #2563eb;
        }

        .navbar-links a.active {
            color: #2563eb;
            font-weight: 600;
        }

        .btn-login {
            background: #2563eb;
            color: white !important;
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: #1d4ed8 !important;
            color: white !important;
        }

        .catalog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .catalog-header {
            margin-bottom: 2rem;
        }

        .catalog-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .catalog-header p {
            color: #64748b;
            font-size: 1rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            background: white;
            padding: 1.25rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .filters input,
        .filters select {
            padding: 0.625rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
            flex: 1;
            min-width: 150px;
            background: white;
        }

        .filters input:focus,
        .filters select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .course-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.2s;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .course-thumbnail {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .course-thumbnail i {
            font-size: 3rem;
            color: white;
            opacity: 0.8;
        }

        .course-thumbnail .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
        }

        .course-thumbnail .subject-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.5);
            color: white;
        }

        .course-body {
            padding: 1.5rem;
        }

        .course-body h3 {
            font-size: 1.125rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .course-body .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .course-body .meta span {
            background: #f1f5f9;
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            color: #475569;
        }

        .course-body .description {
            color: #4b5563;
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-body .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
        }

        .course-body .footer .price {
            font-weight: 700;
            color: #2563eb;
        }

        .course-body .footer .price.free {
            color: #10b981;
        }

        .btn-view-course {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-view-course:hover {
            background: #1d4ed8;
        }

        .btn-view-course.published {
            background: #10b981;
        }

        .btn-view-course.published:hover {
            background: #059669;
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            grid-column: 1 / -1;
        }

        .loading-spinner i {
            font-size: 2rem;
            margin-bottom: 1rem;
            display: block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            grid-column: 1 / -1;
        }

        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            color: #cbd5e1;
        }

        .btn-retry {
            margin-top: 1rem;
            padding: 0.625rem 1.25rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-retry:hover {
            background: #1d4ed8;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
        }

        .modal-close:hover {
            color: #1a1a2e;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
        }

        .modal-detail {
            margin-bottom: 0.75rem;
        }

        .modal-detail strong {
            color: #475569;
            font-weight: 600;
        }

        .modal-detail p {
            color: #4b5563;
            margin-top: 0.25rem;
        }

        .modal-modules {
            margin-top: 1.5rem;
        }

        .modal-modules h4 {
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .modal-modules ul {
            list-style: none;
            padding: 0;
        }

        .modal-modules li {
            padding: 0.5rem 0;
            border-bottom: 1px solid #f1f5f9;
            color: #4b5563;
            font-size: 0.875rem;
        }

        .modal-modules li:last-child {
            border-bottom: none;
        }

        .modal-modules li i {
            color: #2563eb;
            margin-right: 0.5rem;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            .navbar-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .catalog-container {
                padding: 1rem;
            }
            .filters {
                flex-direction: column;
            }
            .filters input,
            .filters select {
                width: 100%;
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">Library<span>Hub</span></a>
        <div class="navbar-links">
            <a href="../index.html">Home</a>
            <a href="catalog.html" class="active">Catalog</a>
            <a href="admin-login.html">Admin</a>
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="../index.html#contact">Contact</a>
        </div>
    </nav>

    <div class="catalog-container">
        <!-- Header -->
        <div class="catalog-header">
            <h1>📚 Course Catalog</h1>
            <p>Browse our collection of courses and learning materials</p>
        </div>

        <!-- Filters -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search by title or description..." />
            <select id="subjectFilter">
                <option value="">All Subjects</option>
                <option value="math">Mathematics</option>
                <option value="physics">Physics</option>
                <option value="chemistry">Chemistry</option>
                <option value="biology">Biology</option>
                <option value="english">English</option>
                <option value="amharic">Amharic</option>
                <option value="history">History</option>
                <option value="geography">Geography</option>
                <option value="cs">Computer Science</option>
            </select>
            <select id="gradeFilter">
                <option value="">All Grades</option>
                <option value="9">Grade 9</option>
                <option value="10">Grade 10</option>
                <option value="11">Grade 11</option>
                <option value="12">Grade 12</option>
            </select>
        </div>

        <!-- Courses Grid -->
        <div class="courses-grid" id="coursesGrid">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <p>Loading courses...</p>
            </div>
        </div>
    </div>

    <!-- Course Detail Modal -->
    <div id="courseModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 class="modal-title" id="modalTitle">Course Details</h2>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.API_BASE || 'https://online-library-hub.onrender.com/api';
        let allCourses = [];

        // Subject display names
        const subjectMap = {
            'math': 'Mathematics',
            'physics': 'Physics',
            'chemistry': 'Chemistry',
            'biology': 'Biology',
            'english': 'English',
            'amharic': 'Amharic',
            'history': 'History',
            'geography': 'Geography',
            'cs': 'Computer Science'
        };

        const iconMap = {
            'math': 'fa-calculator',
            'physics': 'fa-atom',
            'chemistry': 'fa-flask',
            'biology': 'fa-dna',
            'english': 'fa-book',
            'amharic': 'fa-language',
            'history': 'fa-landmark',
            'geography': 'fa-globe',
            'cs': 'fa-laptop-code'
        };

        const colorMap = {
            'math': 'from-blue-500 to-cyan-500',
            'physics': 'from-orange-500 to-red-500',
            'chemistry': 'from-green-500 to-emerald-500',
            'biology': 'from-purple-500 to-pink-500',
            'english': 'from-indigo-500 to-blue-500',
            'amharic': 'from-yellow-500 to-orange-500',
            'history': 'from-amber-500 to-yellow-500',
            'geography': 'from-teal-500 to-cyan-500',
            'cs': 'from-purple-500 to-indigo-500'
        };

        // ==================== FETCH COURSES ====================
        async function fetchCourses() {
            const grid = document.getElementById('coursesGrid');
            grid.innerHTML = `
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                    <p>Loading courses...</p>
                </div>
            `;

            try {
                const search = document.getElementById('searchInput').value.trim();
                const subject = document.getElementById('subjectFilter').value;
                const grade = document.getElementById('gradeFilter').value;

                let url = `${API_BASE}/courses?`;
                if (search) url += `search=${encodeURIComponent(search)}&`;
                if (subject) url += `subject=${subject}&`;
                if (grade) url += `grade=${grade}&`;
                url += `page=1&limit=50`;

                console.log('📡 Fetching courses from:', url);

                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('📦 Courses data:', data);

                if (data.success && data.courses) {
                    allCourses = data.courses;
                    renderCourses(allCourses);
                } else {
                    allCourses = [];
                    renderCourses([]);
                }

            } catch (error) {
                console.error('❌ Error fetching courses:', error);
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Error Loading Courses</h3>
                        <p>${error.message || 'Please try again later.'}</p>
                        <button class="btn-retry" onclick="fetchCourses()">
                            <i class="fas fa-redo"></i> Retry
                        </button>
                    </div>
                `;
            }
        }

        // ==================== RENDER COURSES ====================
        function renderCourses(courses) {
            const grid = document.getElementById('coursesGrid');

            if (!courses || courses.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-book-open"></i>
                        <h3>No Courses Found</h3>
                        <p>No courses match your search criteria.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = courses.map(course => {
                const subjectDisplay = subjectMap[course.subject] || course.subject || 'General';
                const icon = iconMap[course.subject] || course.icon || 'fa-book';
                const color = colorMap[course.subject] || course.color || 'from-blue-500 to-cyan-500';
                const isFree = course.price === 0 || !course.price;
                const isPublished = course.published !== false;

                return `
                    <div class="course-card">
                        <div class="course-thumbnail" style="background: linear-gradient(135deg, ${color.replace('from-', '').replace('to-', '').split(' ').join(', ')})">
                            <i class="fas ${icon}"></i>
                            <span class="subject-badge">${subjectDisplay}</span>
                            <span class="badge">Grade ${course.grade || 'N/A'}</span>
                        </div>
                        <div class="course-body">
                            <h3>${escapeHtml(course.title)}</h3>
                            <div class="meta">
                                <span><i class="fas fa-layer-group"></i> ${course.totalLessons || 0} Lessons</span>
                                <span><i class="fas ${icon}"></i> ${subjectDisplay}</span>
                            </div>
                            <div class="description">${escapeHtml(course.description || 'No description available.')}</div>
                            <div class="footer">
                                <span class="price ${isFree ? 'free' : ''}">
                                    ${isFree ? 'Free' : `$${course.price.toFixed(2)}`}
                                </span>
                                <button class="btn-view-course ${isPublished ? 'published' : ''}" onclick="viewCourse('${course.id}')">
                                    <i class="fas fa-eye"></i> View Details
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== VIEW COURSE DETAILS ====================
        async function viewCourse(courseId) {
            try {
                const response = await fetch(`${API_BASE}/courses/${courseId}`);
                const data = await response.json();

                if (data.success && data.course) {
                    const course = data.course;
                    const subjectDisplay = subjectMap[course.subject] || course.subject || 'General';
                    const isFree = course.price === 0 || !course.price;

                    let modulesHtml = '';
                    if (course.modules && course.modules.length > 0) {
                        modulesHtml = `
                            <div class="modal-modules">
                                <h4><i class="fas fa-layer-group"></i> Modules (${course.modules.length})</h4>
                                <ul>
                                    ${course.modules.map(module => `
                                        <li>
                                            <i class="fas fa-folder"></i>
                                            <strong>${escapeHtml(module.title)}</strong>
                                            ${module.lessons ? ` (${module.lessons.length} lessons)` : ''}
                                            ${module.description ? `<br><span style="font-size: 0.8rem; color: #64748b;">${escapeHtml(module.description)}</span>` : ''}
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        `;
                    }

                    document.getElementById('modalTitle').textContent = course.title;
                    document.getElementById('modalContent').innerHTML = `
                        <div class="modal-detail">
                            <strong>Subject:</strong> ${subjectDisplay}
                        </div>
                        <div class="modal-detail">
                            <strong>Grade:</strong> ${course.grade || 'N/A'}
                        </div>
                        <div class="modal-detail">
                            <strong>Price:</strong> ${isFree ? 'Free' : `$${course.price.toFixed(2)}`}
                        </div>
                        <div class="modal-detail">
                            <strong>Status:</strong> ${course.published ? '✅ Published' : '🔒 Draft'}
                        </div>
                        <div class="modal-detail">
                            <strong>Total Lessons:</strong> ${course.totalLessons || 0}
                        </div>
                        <div class="modal-detail">
                            <strong>Description:</strong>
                            <p>${escapeHtml(course.description || 'No description available.')}</p>
                        </div>
                        ${modulesHtml}
                    `;

                    document.getElementById('courseModal').classList.add('active');
                } else {
                    alert('Failed to load course details.');
                }
            } catch (error) {
                console.error('Error loading course details:', error);
                alert('Error loading course details. Please try again.');
            }
        }

        // ==================== MODAL FUNCTIONS ====================
        function closeModal() {
            document.getElementById('courseModal').classList.remove('active');
        }

        // Close modal on backdrop click
        document.getElementById('courseModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // ==================== UTILITY FUNCTIONS ====================
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== FILTER FUNCTIONS ====================
        function filterCourses() {
            fetchCourses();
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('searchInput').addEventListener('input', filterCourses);
        document.getElementById('subjectFilter').addEventListener('change', filterCourses);
        document.getElementById('gradeFilter').addEventListener('change', filterCourses);

        // ==================== KEYBOARD SHORTCUT ====================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // ==================== INITIALIZE ====================
        document.addEventListener('DOMContentLoaded', function() {
            fetchCourses();
        });
    </script>
</body>
</html>
