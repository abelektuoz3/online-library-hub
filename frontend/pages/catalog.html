<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalog | Online Library Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../style/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
        }

        .navbar {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1a1a2e;
            text-decoration: none;
        }

        .navbar-brand span {
            color: #2563eb;
        }

        .navbar-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .navbar-links a {
            color: #4b5563;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .navbar-links a:hover {
            color: #2563eb;
        }

        .navbar-links a.active {
            color: #2563eb;
            font-weight: 600;
        }

        .catalog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .catalog-header {
            margin-bottom: 2rem;
        }

        .catalog-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .catalog-header p {
            color: #64748b;
            font-size: 1rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            background: white;
            padding: 1.25rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .filters input,
        .filters select {
            padding: 0.625rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
            flex: 1;
            min-width: 150px;
            background: white;
        }

        .filters input:focus,
        .filters select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .resource-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.2s;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .resource-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .resource-thumbnail {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        .resource-thumbnail i {
            font-size: 3rem;
            color: white;
            opacity: 0.8;
        }

        .resource-thumbnail .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .resource-thumbnail:hover .play-overlay {
            opacity: 1;
        }

        .resource-thumbnail .play-button {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2563eb;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .resource-thumbnail .play-button:hover {
            transform: scale(1.1);
        }

        .resource-thumbnail .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
        }

        .resource-thumbnail .type-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .type-badge-video {
            background: rgba(236, 72, 153, 0.8);
            color: white;
        }

        .type-badge-pdf {
            background: rgba(245, 158, 11, 0.8);
            color: white;
        }

        .type-badge-audio {
            background: rgba(37, 99, 235, 0.8);
            color: white;
        }

        .type-badge-default {
            background: rgba(107, 114, 128, 0.8);
            color: white;
        }

        .resource-body {
            padding: 1.5rem;
        }

        .resource-body h3 {
            font-size: 1.125rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .resource-body .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .resource-body .meta span {
            background: #f1f5f9;
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            color: #475569;
        }

        .resource-body .description {
            color: #4b5563;
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .resource-body .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
        }

        .resource-body .footer .status {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .status-available {
            color: #10b981;
        }

        .status-unavailable {
            color: #ef4444;
        }

        .btn-view {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-view:hover {
            background: #1d4ed8;
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            grid-column: 1 / -1;
        }

        .loading-spinner i {
            font-size: 2rem;
            margin-bottom: 1rem;
            display: block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            grid-column: 1 / -1;
        }

        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            color: #cbd5e1;
        }

        .btn-retry {
            margin-top: 1rem;
            padding: 0.625rem 1.25rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-retry:hover {
            background: #1d4ed8;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
            z-index: 10;
        }

        .modal-close:hover {
            color: #1a1a2e;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .modal-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .modal-meta span {
            background: #f1f5f9;
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            color: #475569;
        }

        .modal-description {
            color: #4b5563;
            font-size: 0.875rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .modal-player {
            background: #0f172a;
            border-radius: 0.5rem;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .modal-player video,
        .modal-player audio {
            width: 100%;
            display: block;
            max-height: 400px;
        }

        .modal-player iframe {
            width: 100%;
            height: 400px;
            border: none;
        }

        .modal-player .placeholder {
            padding: 3rem;
            text-align: center;
            color: #64748b;
        }

        .modal-player .placeholder i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .modal-download {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.5rem 1.25rem;
            background: #2563eb;
            color: white;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
        }

        .modal-download:hover {
            background: #1d4ed8;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            .navbar-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .catalog-container {
                padding: 1rem;
            }
            .filters {
                flex-direction: column;
            }
            .filters input,
            .filters select {
                width: 100%;
            }
            .resources-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 1rem;
            }
            .modal-player iframe {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">Library<span>Hub</span></a>
        <div class="navbar-links">
            <a href="../index.html">Home</a>
            <a href="catalog.html" class="active">Catalog</a>
            <a href="admin/admin-dashboard.html">Admin</a>
            <a href="../index.html#contact">Contact</a>
        </div>
    </nav>

    <div class="catalog-container">
        <!-- Header -->
        <div class="catalog-header">
            <h1>📚 Resource Catalog</h1>
            <p>Browse our collection of books, videos, and learning materials</p>
        </div>

        <!-- Filters -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search by title or description..." />
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Fiction">Fiction</option>
                <option value="Non-Fiction">Non-Fiction</option>
                <option value="Programming">Programming</option>
                <option value="History">History</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
                <option value="Arts">Arts</option>
                <option value="Technology">Technology</option>
                <option value="Other">Other</option>
            </select>
            <select id="gradeFilter">
                <option value="">All Grade Levels</option>
                <option value="Grade 8-10">Grade 8-10</option>
                <option value="Grade 9-11">Grade 9-11</option>
                <option value="Grade 9-12">Grade 9-12</option>
                <option value="Grade 10-12">Grade 10-12</option>
                <option value="Grade 11-12">Grade 11-12</option>
                <option value="College">College</option>
                <option value="University">University</option>
                <option value="Other">Other</option>
            </select>
            <select id="typeFilter">
                <option value="">All Types</option>
                <option value="Video">🎬 Videos</option>
                <option value="PDF">📄 PDFs</option>
                <option value="Audio">🎵 Audio</option>
                <option value="Book">📚 Books</option>
            </select>
        </div>

        <!-- Resources Grid -->
        <div class="resources-grid" id="resourcesGrid">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <p>Loading resources...</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="resourceModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-description" id="modalDescription"></div>
            <div class="modal-player" id="modalPlayer"></div>
        </div>
    </div>

    <script src="../scripts/api-config.js"></script>
    <script>
        const API_BASE = window.API_BASE || "https://online-library-hub.onrender.com/api";
        let allResources = [];

        function getFileTypeColor(type) {
            const colors = {
                'Video': 'linear-gradient(135deg, #ec4899, #8b5cf6)',
                'PDF': 'linear-gradient(135deg, #f59e0b, #ef4444)',
                'Audio': 'linear-gradient(135deg, #3b82f6, #8b5cf6)',
                'Book': 'linear-gradient(135deg, #667eea, #764ba2)',
                'E-Book': 'linear-gradient(135deg, #667eea, #764ba2)',
                'Other': 'linear-gradient(135deg, #6b7280, #4b5563)'
            };
            return colors[type] || colors['Other'];
        }

        function getFileIcon(type) {
            const icons = {
                'Video': 'fa-video',
                'PDF': 'fa-file-pdf',
                'Audio': 'fa-music',
                'Book': 'fa-book',
                'E-Book': 'fa-book-open',
                'Other': 'fa-file'
            };
            return icons[type] || icons['Other'];
        }

        function getTypeBadgeClass(type) {
            const classes = {
                'Video': 'type-badge-video',
                'PDF': 'type-badge-pdf',
                'Audio': 'type-badge-audio'
            };
            return classes[type] || 'type-badge-default';
        }

        async function fetchResources() {
            const grid = document.getElementById('resourcesGrid');
            grid.innerHTML = `
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                    <p>Loading resources...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE}/catalog`, {
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error('Failed to fetch resources');

                const data = await response.json();
                console.log('📦 Catalog data:', data);

                let resources = [];

                if (data.success && data.resources) {
                    resources = data.resources;
                } else if (data.success && data.books) {
                    resources = data.books;
                } else if (Array.isArray(data)) {
                    resources = data;
                } else {
                    for (const key in data) {
                        if (Array.isArray(data[key])) {
                            resources = data[key];
                            break;
                        }
                    }
                }

                allResources = resources;
                renderResources(resources);

            } catch (error) {
                console.error('Error fetching resources:', error);
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Error Loading Resources</h3>
                        <p>${error.message || 'Please try again later.'}</p>
                        <button class="btn-retry" onclick="fetchResources()">
                            <i class="fas fa-redo"></i> Retry
                        </button>
                    </div>
                `;
            }
        }

        function renderResources(resources) {
            const grid = document.getElementById('resourcesGrid');

            if (!resources || resources.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-book-open"></i>
                        <h3>No Resources Found</h3>
                        <p>No resources match your search criteria.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = resources.map(resource => {
                const isAvailable = resource.available !== false;
                const resourceType = resource.resource_type || 'Other';
                const bgColor = getFileTypeColor(resourceType);
                const icon = getFileIcon(resourceType);
                const badgeClass = getTypeBadgeClass(resourceType);
                const gradeDisplay = resource.grade_level || 'All Levels';
                const category = resource.category || 'General';
                const resourceId = resource._id || resource.id;

                return `
                    <div class="resource-card">
                        <div class="resource-thumbnail" style="background: ${bgColor}" onclick="viewResource('${resourceId}')">
                            <i class="fas ${icon}"></i>
                            <div class="play-overlay">
                                <div class="play-button">
                                    <i class="fas fa-play"></i>
                                </div>
                            </div>
                            <span class="type-badge ${badgeClass}">${resourceType}</span>
                            <span class="badge">${isAvailable ? '✅ Available' : '❌ Unavailable'}</span>
                        </div>
                        <div class="resource-body">
                            <h3>${escapeHtml(resource.title || 'Untitled')}</h3>
                            <div class="meta">
                                <span>📂 ${escapeHtml(category)}</span>
                                <span>📚 ${escapeHtml(gradeDisplay)}</span>
                                <span>📖 ${escapeHtml(resourceType)}</span>
                            </div>
                            <div class="description">${escapeHtml(resource.description || 'No description available.')}</div>
                            <div class="footer">
                                <span class="status ${isAvailable ? 'status-available' : 'status-unavailable'}">
                                    ${isAvailable ? 'Available' : 'Unavailable'}
                                </span>
                                <button class="btn-view" onclick="viewResource('${resourceId}')">
                                    <i class="fas fa-eye"></i> View
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterResources() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const category = document.getElementById('categoryFilter').value;
            const grade = document.getElementById('gradeFilter').value;
            const type = document.getElementById('typeFilter').value;

            let filtered = allResources.filter(resource => {
                let matchesSearch = true;
                if (searchTerm) {
                    matchesSearch = 
                        (resource.title || '').toLowerCase().includes(searchTerm) ||
                        (resource.description || '').toLowerCase().includes(searchTerm) ||
                        (resource.author || '').toLowerCase().includes(searchTerm);
                }

                let matchesCategory = true;
                if (category) {
                    matchesCategory = (resource.category || '') === category;
                }

                let matchesGrade = true;
                if (grade) {
                    const resourceGrade = resource.grade_level || '';
                    matchesGrade = resourceGrade === grade;
                }

                let matchesType = true;
                if (type) {
                    const resourceType = resource.resource_type || '';
                    matchesType = resourceType === type;
                }

                return matchesSearch && matchesCategory && matchesGrade && matchesType;
            });

            renderResources(filtered);
        }

        // ==================== VIEW RESOURCE ====================
        window.viewResource = async function(id) {
            const resource = allResources.find(r => (r._id || r.id) === id);
            if (!resource) {
                alert('Resource not found.');
                return;
            }

            const resourceType = resource.resource_type || 'Other';
            const fileUrl = resource.fileUrl || resource.coverImage || '';

            // Set modal title
            document.getElementById('modalTitle').textContent = resource.title || 'Untitled';
            
            // Set meta info
            document.getElementById('modalMeta').innerHTML = `
                <span>${resourceType}</span>
                <span>📂 ${escapeHtml(resource.category || 'General')}</span>
                <span>📚 ${escapeHtml(resource.grade_level || 'All Levels')}</span>
                <span>${resource.available !== false ? '✅ Available' : '❌ Unavailable'}</span>
            `;
            
            // Set description
            document.getElementById('modalDescription').textContent = resource.description || 'No description available.';
            
            // Set player
            const playerContainer = document.getElementById('modalPlayer');
            
            if (fileUrl) {
                const isVideo = fileUrl.match(/\.(mp4|webm|ogg|mov|avi)$/i) || resourceType === 'Video';
                const isAudio = fileUrl.match(/\.(mp3|wav|ogg|m4a)$/i) || resourceType === 'Audio';
                const isPDF = fileUrl.match(/\.pdf$/i) || resourceType === 'PDF';
                
                let playerHtml = '';
                
                if (isVideo) {
                    playerHtml = `
                        <video controls style="width:100%; max-height: 400px;">
                            <source src="${fileUrl}" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    `;
                } else if (isAudio) {
                    playerHtml = `
                        <audio controls style="width:100%;">
                            <source src="${fileUrl}" type="audio/mpeg">
                            Your browser does not support the audio tag.
                        </audio>
                    `;
                } else if (isPDF) {
                    playerHtml = `
                        <iframe src="${fileUrl}" style="width:100%; height:400px; border:none;"></iframe>
                        <div style="text-align: center; margin-top: 0.5rem;">
                            <a href="${fileUrl}" target="_blank" class="modal-download">
                                <i class="fas fa-external-link-alt"></i> Open PDF
                            </a>
                            <a href="${fileUrl}" download class="modal-download" style="background: #10b981; margin-left: 0.5rem;">
                                <i class="fas fa-download"></i> Download
                            </a>
                        </div>
                    `;
                } else {
                    playerHtml = `
                        <div class="placeholder">
                            <i class="fas fa-file"></i>
                            <p>File available</p>
                            <a href="${fileUrl}" target="_blank" class="modal-download">
                                <i class="fas fa-external-link-alt"></i> Open File
                            </a>
                            <a href="${fileUrl}" download class="modal-download" style="background: #10b981; margin-left: 0.5rem;">
                                <i class="fas fa-download"></i> Download
                            </a>
                        </div>
                    `;
                }
                
                playerContainer.innerHTML = playerHtml;
            } else {
                playerContainer.innerHTML = `
                    <div class="placeholder">
                        <i class="fas fa-file"></i>
                        <p>No file attached</p>
                        <p style="font-size: 0.875rem; margin-top: 0.5rem; color: #94a3b8;">This resource has no downloadable content.</p>
                    </div>
                `;
            }
            
            // Show modal
            document.getElementById('resourceModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        // ==================== CLOSE MODAL ====================
        function closeModal() {
            document.getElementById('resourceModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            
            // Stop any playing media
            const player = document.querySelector('#modalPlayer video, #modalPlayer audio');
            if (player) {
                player.pause();
            }
            document.getElementById('modalPlayer').innerHTML = '';
        }

        // Close modal on backdrop click
        document.getElementById('resourceModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal on ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // ==================== UTILITY FUNCTIONS ====================
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('searchInput').addEventListener('input', filterResources);
        document.getElementById('categoryFilter').addEventListener('change', filterResources);
        document.getElementById('gradeFilter').addEventListener('change', filterResources);
        document.getElementById('typeFilter').addEventListener('change', filterResources);

        // ==================== INITIALIZE ====================
        document.addEventListener('DOMContentLoaded', fetchResources);
    </script>
</body>
</html>
