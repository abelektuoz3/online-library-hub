<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Online Library Hub</title>
    <meta
      name="description"
      content="Sign in to your Online Library Hub account to access books, study tools, and more." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../style/style.css" />
    <style>
      /* ===== Reset & Base ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #f5f7fa;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ===== Navbar ===== */
      .navbar {
        background: white;
        border-bottom: 1px solid #e2e8f0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .nav-container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0.75rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo a {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1a1a2e;
        text-decoration: none;
      }

      .logo a span {
        color: #2563eb;
      }

      .nav-links {
        display: flex;
        list-style: none;
        gap: 1.75rem;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: #4a5568;
        font-weight: 500;
        font-size: 0.875rem;
        transition: color 0.2s;
      }

      .nav-links a:hover {
        color: #2563eb;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid #2563eb;
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
        color: #2563eb !important;
      }

      .btn-outline:hover {
        background: #eff6ff;
      }

      .btn-primary-nav {
        background: #2563eb;
        color: white !important;
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
      }

      .btn-primary-nav:hover {
        background: #1d4ed8;
        color: white !important;
      }

      .hamburger {
        display: none;
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #1a1a2e;
      }

      /* ===== Main Layout ===== */
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
      }

      /* ===== Login Card ===== */
      .login-card {
        max-width: 440px;
        width: 100%;
        background: white;
        border-radius: 1rem;
        box-shadow:
          0 1px 3px 0 rgba(0, 0, 0, 0.1),
          0 1px 2px -1px rgba(0, 0, 0, 0.1);
        padding: 2rem;
      }

      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-header h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 0.5rem;
      }

      .login-header p {
        font-size: 0.875rem;
        color: #64748b;
      }

      /* ===== Form Elements ===== */
      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-group label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #334155;
        margin-bottom: 0.5rem;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper i {
        position: absolute;
        left: 0.875rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 1rem;
      }

      .input-wrapper input {
        width: 100%;
        padding: 0.625rem 0.875rem 0.625rem 2.5rem;
        border: 1px solid #cbd5e1;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-family: "Inter", sans-serif;
        transition: all 0.2s;
        background: white;
      }

      .input-wrapper input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .input-wrapper .toggle-password {
        position: absolute;
        right: 0.875rem;
        left: auto;
        cursor: pointer;
        color: #94a3b8;
      }

      .toggle-password:hover {
        color: #64748b;
      }

      /* ===== Form Options ===== */
      .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        color: #475569;
      }

      .checkbox input {
        width: 1rem;
        height: 1rem;
        cursor: pointer;
        accent-color: #2563eb;
      }

      .forgot-link {
        color: #2563eb;
        text-decoration: none;
        font-weight: 500;
      }

      .forgot-link:hover {
        text-decoration: underline;
      }

      /* ===== Button ===== */
      .btn-login {
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        padding: 0.75rem;
        font-size: 0.875rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background 0.2s;
        font-family: "Inter", sans-serif;
      }

      .btn-login:hover {
        background: #1d4ed8;
      }

      .btn-login:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }

      /* ===== Divider ===== */
      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 1.5rem 0;
        color: #94a3b8;
        font-size: 0.75rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #e2e8f0;
      }

      .divider span {
        padding: 0 0.75rem;
      }

      /* ===== Social Buttons ===== */
      .social-buttons {
        display: flex;
        gap: 1rem;
      }

      .social-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.625rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        background: white;
        font-size: 0.875rem;
        font-weight: 500;
        color: #334155;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Inter", sans-serif;
      }

      .social-btn:hover {
        background: #f8fafc;
        border-color: #cbd5e1;
      }

      /* ===== Register Link ===== */
      .register-link {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e2e8f0;
        font-size: 0.875rem;
        color: #475569;
      }

      .register-link a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      .register-link a:hover {
        text-decoration: underline;
      }

      /* ===== Message ===== */
      #form-message {
        margin-bottom: 1rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        text-align: center;
        display: none;
      }

      .message.success {
        display: block;
        background: #ecfdf5;
        color: #047857;
        border: 1px solid #a7f3d0;
      }

      .message.error {
        display: block;
        background: #fef2f2;
        color: #b91c1c;
        border: 1px solid #fecaca;
      }

      /* ===== Field error ===== */
      .field-error {
        font-size: 0.75rem;
        color: #b91c1c;
        margin-top: 0.25rem;
        display: none;
      }

      .input-wrapper input.input-error {
        border-color: #ef4444;
      }

      /* ===== Footer ===== */
      footer {
        background: white;
        border-top: 1px solid #e2e8f0;
        text-align: center;
        padding: 1.5rem;
        color: #64748b;
        font-size: 0.75rem;
      }

      /* ===== Responsive ===== */
      @media (max-width: 768px) {
        .hamburger {
          display: block;
        }

        .nav-links {
          display: none;
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: white;
          flex-direction: column;
          padding: 1rem;
          gap: 1rem;
          border-bottom: 1px solid #e2e8f0;
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-links.active {
          display: flex;
        }

        .login-card {
          padding: 1.5rem;
        }

        .social-buttons {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <a href="../index.html">Library<span>Hub</span></a>
        </div>
        <button class="hamburger" id="hamburger">☰</button>
        <ul class="nav-links" id="navLinks"></ul>
      </div>
    </nav>

    <main>
      <div class="login-card">
        <div class="login-header">
          <h1>Welcome back</h1>
          <p>Sign in to access your library account</p>
        </div>

        <div id="form-message"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
                autocomplete="email" />
            </div>
            <div class="field-error" id="email-error"></div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
                autocomplete="current-password" />
              <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>
            <div class="field-error" id="password-error"></div>
          </div>

          <div class="form-options">
            <label class="checkbox">
              <input type="checkbox" id="rememberMe" /> Remember me
            </label>
            <a href="forgot-password.html" class="forgot-link"
              >Forgot password?</a
            >
          </div>

          <button type="submit" class="btn-login" id="loginBtn">Sign in</button>
        </form>

        <div class="divider">
          <span>OR</span>
        </div>

        <div class="social-buttons">
          <button type="button" class="social-btn" id="googleLoginBtn">
            <i class="fab fa-google"></i> Google
          </button>
          <button type="button" class="social-btn" id="githubLoginBtn">
            <i class="fab fa-github"></i> GitHub
          </button>
        </div>

        <div class="register-link">
          Don't have an account? <a href="register.html">Create account</a>
        </div>
      </div>
    </main>

    <footer>
      <p>
        &copy; <span id="current-year"></span> Online Library Hub. All rights
        reserved.
      </p>
    </footer>

    <script src="/scripts/api-config.js"></script>
    <script src="../scripts/main.js"></script>
    <script>
      // ===== Login Page Specific Logic =====
      const API_BASE_URL =
        window.API_BASE || "https://online-library-hub.onrender.com/api";

      function showMessage(message, type, containerId) {
        containerId = containerId || "form-message";
        var msgDiv = document.getElementById(containerId);
        if (!msgDiv) {
          msgDiv = document.createElement("div");
          msgDiv.id = containerId;
          var form = document.querySelector("form");
          if (form) {
            form.parentNode.insertBefore(msgDiv, form);
          }
        }
        msgDiv.className = "message " + type;
        msgDiv.style.display = "block";
        var icon =
          type === "success" ? "fa-check-circle" : "fa-exclamation-circle";
        msgDiv.innerHTML = '<i class="fas ' + icon + '"></i> ' + message;

        setTimeout(function () {
          if (msgDiv) {
            msgDiv.style.display = "none";
          }
        }, 5000);
      }

      function showFieldError(fieldId, message) {
        var errorDiv = document.getElementById(fieldId + "-error");
        if (errorDiv) {
          errorDiv.textContent = message;
          errorDiv.style.display = "block";
        }
        var input = document.getElementById(fieldId);
        if (input) {
          input.classList.add("input-error");
        }
      }

      function clearFieldError(fieldId) {
        var errorDiv = document.getElementById(fieldId + "-error");
        if (errorDiv) {
          errorDiv.textContent = "";
          errorDiv.style.display = "none";
        }
        var input = document.getElementById(fieldId);
        if (input) {
          input.classList.remove("input-error");
        }
      }

      function clearAllFieldErrors() {
        clearFieldError("email");
        clearFieldError("password");
      }

      if (
        new URLSearchParams(window.location.search).get("suspended") === "1"
      ) {
        showMessage(
          "Your account has been suspended. Please contact the library administrator.",
          "error",
        );
      }

      var EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      // Password visibility toggle
      var togglePassword = document.getElementById("togglePassword");
      var passwordInput = document.getElementById("password");

      if (togglePassword && passwordInput) {
        togglePassword.addEventListener("click", function () {
          var type = passwordInput.type === "password" ? "text" : "password";
          passwordInput.type = type;
          this.classList.toggle("fa-eye");
          this.classList.toggle("fa-eye-slash");
        });
      }

      // Remember me functionality
      var rememberCheckbox = document.getElementById("rememberMe");
      var emailInput = document.getElementById("email");

      if (localStorage.getItem("rememberedEmail")) {
        emailInput.value = localStorage.getItem("rememberedEmail");
        if (rememberCheckbox) rememberCheckbox.checked = true;
      }

      // Login form submission
      var loginForm = document.getElementById("loginForm");
      if (loginForm) {
        loginForm.addEventListener("submit", async function (e) {
          e.preventDefault();
          clearAllFieldErrors();

          var email = emailInput ? emailInput.value.trim() : "";
          var password = passwordInput ? passwordInput.value : "";
          var submitBtn = document.getElementById("loginBtn");

          // Remember me
          if (rememberCheckbox && rememberCheckbox.checked) {
            localStorage.setItem("rememberedEmail", email);
          } else {
            localStorage.removeItem("rememberedEmail");
          }

          // Client-side validation
          var hasError = false;

          if (!email) {
            showFieldError("email", "Email is required");
            hasError = true;
          } else if (!EMAIL_REGEX.test(email)) {
            showFieldError("email", "Please enter a valid email address");
            hasError = true;
          }

          if (!password) {
            showFieldError("password", "Password is required");
            hasError = true;
          }

          if (hasError) {
            showMessage("Please fix the errors below", "error");
            return;
          }

          // Submit to server
          if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.textContent = "Signing in...";
          }

          try {
            var response = await fetch(API_BASE_URL + "/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email: email, password: password }),
            });

            var data = await response.json();

            if (response.ok && data.success) {
              localStorage.setItem("token", data.token);
              localStorage.setItem("user", JSON.stringify(data.user));
              showMessage(
                "Login successful! Redirecting to dashboard...",
                "success",
              );

              // Redirect to dashboard after 1 second
              setTimeout(function () {
                window.location.href = "/pages/dashboard.html";
              }, 1000);
            } else {
              showMessage(data.error || "Invalid email or password", "error");
              if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.textContent = "Sign in";
              }
            }
          } catch (err) {
            console.error("Login error:", err);
            showMessage(
              "Server error. Please make sure the backend is running.",
              "error",
            );
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.textContent = "Sign in";
            }
          }
        });
      }

      const BACKEND_BASE =
        window.BACKEND_BASE ||
        API_BASE_URL.replace(/\/api$/, "") ||
        "https://online-library-hub.onrender.com";

      // Google Login - Redirect to OAuth
      var googleBtn = document.getElementById("googleLoginBtn");
      if (googleBtn) {
        googleBtn.addEventListener("click", function () {
          localStorage.setItem("redirectAfterLogin", "/pages/dashboard.html");
          window.location.href = `${BACKEND_BASE}/auth/google`;
        });
      }

      // GitHub Login - Redirect to OAuth
      var githubBtn = document.getElementById("githubLoginBtn");
      if (githubBtn) {
        githubBtn.addEventListener("click", function () {
          localStorage.setItem("redirectAfterLogin", "/pages/dashboard.html");
          window.location.href = `${BACKEND_BASE}/auth/github`;
        });
      }

      // Check for OAuth errors in URL
      var urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get("error") === "google_auth_failed") {
        showMessage("Google sign in failed. Please try again.", "error");
        window.history.replaceState(
          {},
          document.title,
          window.location.pathname,
        );
      }
      if (urlParams.get("error") === "no_code") {
        showMessage("Google authentication error. Please try again.", "error");
        window.history.replaceState(
          {},
          document.title,
          window.location.pathname,
        );
      }
      if (urlParams.get("error") === "github_auth_failed") {
        showMessage("GitHub sign in failed. Please try again.", "error");
        window.history.replaceState(
          {},
          document.title,
          window.location.pathname,
        );
      }
      if (urlParams.get("error") === "github_no_code") {
        showMessage("GitHub authentication error. Please try again.", "error");
        window.history.replaceState(
          {},
          document.title,
          window.location.pathname,
        );
      }

      // Set current year in footer
      document.getElementById("current-year").textContent =
        new Date().getFullYear();
    </script>
  </body>
</html>
