<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Online Library Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #f5f7fa;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .navbar {
        background: white;
        border-bottom: 1px solid #e2e8f0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .nav-container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0.75rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo a {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1a1a2e;
        text-decoration: none;
      }

      .logo a span {
        color: #2563eb;
      }

      .nav-links {
        display: flex;
        list-style: none;
        gap: 1.75rem;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: #4a5568;
        font-weight: 500;
        font-size: 0.875rem;
        transition: color 0.2s;
      }

      .nav-links a:hover {
        color: #2563eb;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid #2563eb;
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
        color: #2563eb !important;
      }

      .btn-outline:hover {
        background: #eff6ff;
      }

      .btn-primary-nav {
        background: #2563eb;
        color: white !important;
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
      }

      .hamburger {
        display: none;
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #1a1a2e;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
      }

      .login-card {
        max-width: 440px;
        width: 100%;
        background: white;
        border-radius: 1rem;
        box-shadow:
          0 1px 3px 0 rgba(0, 0, 0, 0.1),
          0 1px 2px -1px rgba(0, 0, 0, 0.1);
        padding: 2rem;
      }

      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-header h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 0.5rem;
      }

      .login-header p {
        font-size: 0.875rem;
        color: #64748b;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-group label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #334155;
        margin-bottom: 0.5rem;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper i {
        position: absolute;
        left: 0.875rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 1rem;
      }

      .input-wrapper input {
        width: 100%;
        padding: 0.625rem 0.875rem 0.625rem 2.5rem;
        border: 1px solid #cbd5e1;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-family: "Inter", sans-serif;
        transition: all 0.2s;
        background: white;
      }

      .input-wrapper input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .input-wrapper .toggle-password {
        position: absolute;
        right: 0.875rem;
        left: auto;
        cursor: pointer;
        color: #94a3b8;
      }

      .toggle-password:hover {
        color: #64748b;
      }

      .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        color: #475569;
      }

      .checkbox input {
        width: 1rem;
        height: 1rem;
        cursor: pointer;
        accent-color: #2563eb;
      }

      .forgot-link {
        color: #2563eb;
        text-decoration: none;
        font-weight: 500;
      }

      .forgot-link:hover {
        text-decoration: underline;
      }

      .btn-login {
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        padding: 0.75rem;
        font-size: 0.875rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background 0.2s;
        font-family: "Inter", sans-serif;
      }

      .btn-login:hover {
        background: #1d4ed8;
      }

      .btn-login:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }

      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 1.5rem 0;
        color: #94a3b8;
        font-size: 0.75rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #e2e8f0;
      }

      .divider span {
        padding: 0 0.75rem;
      }

      .social-buttons {
        display: flex;
        gap: 1rem;
      }

      .social-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.625rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        background: white;
        font-size: 0.875rem;
        font-weight: 500;
        color: #334155;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Inter", sans-serif;
      }

      .social-btn:hover {
        background: #f8fafc;
        border-color: #cbd5e1;
      }

      .register-link {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e2e8f0;
        font-size: 0.875rem;
        color: #475569;
      }

      .register-link a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      .register-link a:hover {
        text-decoration: underline;
      }

      #form-message {
        margin-bottom: 1rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        text-align: center;
        display: none;
      }

      .message.success {
        display: block;
        background: #ecfdf5;
        color: #047857;
        border: 1px solid #a7f3d0;
      }

      .message.error {
        display: block;
        background: #fef2f2;
        color: #b91c1c;
        border: 1px solid #fecaca;
      }

      footer {
        background: white;
        border-top: 1px solid #e2e8f0;
        text-align: center;
        padding: 1.5rem;
        color: #64748b;
        font-size: 0.75rem;
      }

      @media (max-width: 768px) {
        .hamburger {
          display: block;
        }

        .nav-links {
          display: none;
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: white;
          flex-direction: column;
          padding: 1rem;
          gap: 1rem;
          border-bottom: 1px solid #e2e8f0;
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-links.active {
          display: flex;
        }

        .login-card {
          padding: 1.5rem;
        }

        .social-buttons {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <a href="../index.html">Library<span>Hub</span></a>
        </div>
        <button class="hamburger" id="hamburger">☰</button>
        <ul class="nav-links" id="navLinks"></ul>
      </div>
    </nav>

    <main>
      <div class="login-card">
        <div class="login-header">
          <h1>Welcome back</h1>
          <p>Sign in to access your library account</p>
        </div>

        <div id="form-message"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
                autocomplete="email" />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
                autocomplete="current-password" />
              <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox">
              <input type="checkbox" id="rememberMe" /> Remember me
            </label>
            <a href="forgot-password.html" class="forgot-link"
              >Forgot password?</a
            >
          </div>

          <button type="submit" class="btn-login" id="loginBtn">Sign in</button>
        </form>

        <div class="divider">
          <span>OR</span>
        </div>

        <div class="social-buttons">
          <button type="button" class="social-btn" id="googleLoginBtn">
            <i class="fab fa-google"></i> Google
          </button>
          <button type="button" class="social-btn" id="githubLoginBtn">
            <i class="fab fa-github"></i> GitHub
          </button>
        </div>

        <div class="register-link">
          Don't have an account?
          <a href="../pages/register.html">Create account</a>
        </div>
      </div>
    </main>

    <footer>
      <p>
        &copy; <span id="current-year"></span> Online Library Hub. All rights
        reserved.
      </p>
    </footer>

    <script src="/scripts/api-config.js"></script>
    <script>
      // ===== ALL SCRIPTS INLINE - Use window.API_BASE =====
      console.log("🔑 Login page loaded");

      // Use API_BASE from api-config.js (window.API_BASE)
      const API_BASE =
        window.API_BASE || "https://online-library-hub.onrender.com/api";
      const BACKEND_BASE =
        window.BACKEND_BASE || "https://online-library-hub.onrender.com";

      console.log("📡 API Base:", API_BASE);

      // ==================== NAVBAR ====================
      function renderNavbar() {
        const navLinks = document.getElementById("navLinks");
        if (!navLinks) return;

        const token = localStorage.getItem("token");
        const user = localStorage.getItem("user");
        const isLoggedIn = !!(token && user);

        if (isLoggedIn) {
          navLinks.innerHTML = `
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="catalog.html">Catalog</a></li>
                    <li><a href="study-tools.html">Study Tools</a></li>
                    <li><a href="faq.html">FAQ</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="#" id="logoutBtn" style="color:#dc2626;">Logout</a></li>
                `;
          const logoutBtn = document.getElementById("logoutBtn");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", function (e) {
              e.preventDefault();
              localStorage.removeItem("token");
              localStorage.removeItem("user");
              window.location.href = "../index.html";
            });
          }
        } else {
          navLinks.innerHTML = `
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="catalog.html">Catalog</a></li>
                    <li><a href="study-tools.html">Study Tools</a></li>
                    <li><a href="faq.html">FAQ</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="login.html" class="btn-outline">Sign In</a></li>
                    <li><a href="register.html" class="btn-primary-nav">Join Free</a></li>
                `;
        }

        const hamburger = document.getElementById("hamburger");
        if (hamburger) {
          hamburger.addEventListener("click", function () {
            navLinks.classList.toggle("active");
          });
        }
      }

      // ==================== PASSWORD TOGGLE ====================
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      if (togglePassword && passwordInput) {
        togglePassword.addEventListener("click", function () {
          const type = passwordInput.type === "password" ? "text" : "password";
          passwordInput.type = type;
          this.classList.toggle("fa-eye");
          this.classList.toggle("fa-eye-slash");
        });
      }

      // ==================== REMEMBER ME ====================
      const rememberCheckbox = document.getElementById("rememberMe");
      const emailInput = document.getElementById("email");
      if (localStorage.getItem("rememberedEmail")) {
        emailInput.value = localStorage.getItem("rememberedEmail");
        if (rememberCheckbox) rememberCheckbox.checked = true;
      }

      // ==================== MESSAGE HELPER ====================
      function showMessage(message, type) {
        const msgDiv = document.getElementById("form-message");
        if (!msgDiv) return;
        msgDiv.style.display = "block";
        msgDiv.className = "message " + type;
        msgDiv.innerHTML =
          '<i class="fas ' +
          (type === "success" ? "fa-check-circle" : "fa-exclamation-circle") +
          '"></i> ' +
          message;
        setTimeout(function () {
          msgDiv.style.display = "none";
        }, 5000);
      }

      // ==================== LOGIN FORM ====================
      const loginForm = document.getElementById("loginForm");

      if (loginForm) {
        console.log("✅ loginForm found - attaching submit listener");

        loginForm.addEventListener("submit", function (e) {
          e.preventDefault();
          e.stopPropagation();

          console.log("🔑 Form submitted - preventing default");

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          const loginBtn = document.getElementById("loginBtn");

          if (!email || !password) {
            showMessage("Please enter both email and password", "error");
            return;
          }

          if (rememberCheckbox && rememberCheckbox.checked) {
            localStorage.setItem("rememberedEmail", email);
          } else {
            localStorage.removeItem("rememberedEmail");
          }

          loginBtn.disabled = true;
          loginBtn.textContent = "Signing in...";

          console.log("📡 Sending login request to:", API_BASE + "/auth/login");

          fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password }),
          })
            .then(function (response) {
              console.log("📨 Response status:", response.status);
              return response.json();
            })
            .then(function (data) {
              console.log("📨 Response data:", data);

              if (data.success) {
                localStorage.setItem("token", data.token);
                localStorage.setItem("user", JSON.stringify(data.user));
                showMessage("Login successful! Redirecting...", "success");
                setTimeout(function () {
                  window.location.href = "dashboard.html";
                }, 1000);
              } else {
                showMessage(data.error || "Invalid email or password", "error");
                loginBtn.disabled = false;
                loginBtn.textContent = "Sign in";
              }
            })
            .catch(function (err) {
              console.error("Login error:", err);
              showMessage("Server error. Please try again.", "error");
              loginBtn.disabled = false;
              loginBtn.textContent = "Sign in";
            });
        });
      } else {
        console.error("❌ loginForm NOT found!");
      }

      // ==================== SOCIAL LOGIN ====================
      document
        .getElementById("googleLoginBtn")
        ?.addEventListener("click", function () {
          window.location.href = BACKEND_BASE + "/auth/google";
        });

      document
        .getElementById("githubLoginBtn")
        ?.addEventListener("click", function () {
          window.location.href = BACKEND_BASE + "/auth/github";
        });

      // ==================== INIT ====================
      document.addEventListener("DOMContentLoaded", function () {
        renderNavbar();
        document.getElementById("current-year").textContent =
          new Date().getFullYear();
      });
    </script>
  </body>
</html>
